<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Vuniverse - Partie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
/* ==========================================================
   VARIABLES GLOBALES
   ========================================================== */
:root{
  --vr-bg: radial-gradient(circle at top, #f6e7cf 0, #141b2f 72%);
  --vr-overlay: none;

  --vr-card-bg: rgba(15, 23, 42, 0.92);
  --vr-card-border: rgba(209, 213, 219, 0.55);
  --vr-text-main: #f9fafb;
  --vr-text-muted: #d1d5db;

  --vr-radius-xl: 22px;
  --vr-shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.45);

  /* Defaults (si jamais une classe univers manque) */
  --vr-universe-bg: none;
  --vr-universe-card: none;
  --vr-universe-choice: none;

  /* Top icons */
  --vr-top-btn:  clamp(36px, 6.8vmin, 66px);
  --vr-top-icon: clamp(26px, 5.2vmin, 52px);

  /* Typo GAME */
  --vr-font-scn-title: clamp(15px, 2.4vmin, 28px);
  --vr-font-scn-text:  clamp(13px, 2.1vmin, 24px);
  --vr-font-choice:    clamp(13px, 2.2vmin, 24px);
}

/* sécurité : si un vieux overlay traîne */
.vr-overlay{ display:none !important; }

/* ==========================================================
   RESET / BASE
   ========================================================== */
*,
*::before,
*::after{ box-sizing: border-box; }

html{
  margin:0;
  padding:0;
  height:100%;
  background: var(--vr-bg);
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-size: cover;
}

body{
  margin:0;
  padding:0;
  min-height:100vh;
  width:100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--vr-text-main);
  background: transparent;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

/* ==========================================================
   LAYOUT PRINCIPAL
   ========================================================== */
.vr-main{
  position: relative;
  z-index: 1;
  max-width: none;
  width: 100%;
  margin: 0;
  padding: 12px 16px 24px;
}

/* ==========================================================
   HEADER HOME
   ========================================================== */
.vr-header{
  position: relative;
  z-index: 2;
  display:flex;
  justify-content:center;
  padding: 12px 24px 4px;
  max-width:none;
  margin:0;
  width:100%;
}

/* voile header OFF */
body:not(.vr-body-game) .vr-header::before{ content:none !important; display:none !important; }
body:not(.vr-body-game) .vr-header > *{ position: relative; z-index:1; }
body.vr-body-game .vr-header::before{ content:none; }

.vr-logo,
.vr-side-nav{ display:none !important; }

.vr-top-actions{
  display:flex;
  gap: 16px;
  align-items:center;
  justify-content:center;
  flex-wrap: nowrap;
}

.vr-icon-button{
  border:none;
  background: transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  text-decoration:none;

  width: var(--vr-top-btn);
  height: var(--vr-top-btn);

  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.vr-top-icon{
  width: var(--vr-top-icon) !important;
  height: var(--vr-top-icon) !important;
  max-width: var(--vr-top-icon) !important;
  max-height: var(--vr-top-icon) !important;
  object-fit: contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

/* ==========================================================
   HUD GAME BASE
   ========================================================== */
body.vr-body-game .vr-hud{
  width:100%;
  max-width: 980px;
  margin: 0 auto 2px;

  display:grid !important;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) !important;
  align-items:center;
  gap: clamp(6px, 1.6vw, 14px);
  padding: 0 clamp(6px, 2.6vw, 14px);

  white-space: nowrap;
}

body.vr-body-game .vr-hud-left{
  justify-self:start;
  display:inline-flex;
  align-items:center;
  gap: clamp(6px, 1.6vw, 12px);
  min-width:0;
}
body.vr-body-game .vr-hud-center{
  justify-self:center;
  min-width:0;
  transform: translateX(clamp(6px, 1.2vw, 14px));
}
body.vr-body-game .vr-hud-right{
  justify-self:end;
  display:inline-flex;
  align-items:center;
  gap: clamp(6px, 1.6vw, 12px);
  min-width:0;
}

/* centre : pas de wrap, ellipsis si trop long */
body.vr-body-game .vr-hud-identity{
  justify-self:center;
  display:inline-flex;
  gap: var(--vr-hud-name-years-gap, clamp(10px, 1.8vw, 18px));
  align-items: baseline;
  justify-content:center;
  font-weight: 900;
  text-shadow: 0 2px 10px rgba(0,0,0,0.55);
  white-space: nowrap;
  max-width: min(58vw, 520px);
  overflow: hidden;
}
body.vr-body-game .vr-hud-name,
body.vr-body-game .vr-hud-years{
  overflow:hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

body.vr-body-game .vr-hud-item{
  display:inline-flex;
  align-items:center;
  gap: 8px;
  padding: clamp(4px, 1.1vh, 8px) clamp(8px, 2.2vw, 14px);
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.30);
  border: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  min-height: clamp(34px, 4.8vh, 44px);
}

body.vr-body-game .vr-hud-icon{
  width:  clamp(18px, 4.2vw, 30px);
  height: clamp(18px, 4.2vw, 30px);
  object-fit: contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  flex:0 0 auto;
}

/* VCoins + Jeton = même bouton */
body.vr-body-game .vr-hud-icon-btn{
  -webkit-appearance: none !important;
  appearance: none !important;
  border: 0 !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;

  cursor:pointer;

  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;

  width:  clamp(18px, 4.2vw, 30px);
  height: clamp(18px, 4.2vw, 30px);

  line-height: 0 !important;
  font-size: 0 !important;
  vertical-align: middle !important;
  flex:0 0 auto;
}
body.vr-body-game .vr-hud-icon-btn .vr-hud-icon{
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}
body.vr-body-game .vr-hud-icon-btn:focus-visible{
  outline: 2px solid rgba(255,255,255,0.65);
  outline-offset: 3px;
  border-radius: 8px;
}

body.vr-body-game .vr-hud-value{
  font-weight: 900;
  font-size: clamp(12px, 2.2vmin, 16px);
  letter-spacing: 0.2px;
  white-space: nowrap;
}

body.vr-body-game .vr-hud-name,
body.vr-body-game .vr-hud-years{
  font-size: clamp(13px, 2.2vmin, 18px);
  line-height: 1.1;
  white-space: nowrap;
}

/* ==========================================================
   SELECTEUR LANGUE
   ========================================================== */
.vr-lang-selector{ display:flex; align-items:center; gap:8px; }
.vr-label{ font-size:13px; color: var(--vr-text-muted); }
.vr-select{
  background: rgba(15, 23, 42, 0.95);
  border-radius: 999px;
  border: 1px solid rgba(148,163,184,0.6);
  color: var(--vr-text-main);
  padding: 6px 10px;
  font-size: 13px;
  outline:none;
}

/* ==========================================================
   VUES
   ========================================================== */
.vr-view{ display:none; }
.vr-view-active{ display:block; }

/* ==========================================================
   HOME
   ========================================================== */
.vr-intro{ margin-top:8px; margin-bottom:16px; display:flex; justify-content:center; }

.vr-main-logo{
  height: clamp(120px, 18vmin, 190px) !important;
  width: min(90vw, 560px) !important;
  max-width: none !important;
  object-fit: contain !important;
}

.vr-section-title{ font-size:18px; margin:12px 0 10px; }
.vr-universe-grid{ display:flex; flex-direction:column; gap:10px; }

.vr-card{
  position:relative;
  border-radius: var(--vr-radius-xl);
  overflow:hidden;
  background: rgba(15, 23, 42, 0.9);
  border: 1px solid var(--vr-card-border);
  padding: 10px 14px;
  text-align:left;
  display:block;
  width:100%;
  cursor:pointer;
  box-shadow: var(--vr-shadow-soft);
}
.vr-card-disabled{ opacity:0.4; cursor:not-allowed; }
.vr-card-bg{
  position:absolute;
  inset:0;
  opacity:0.42;
  background-size:cover;
  background-position:center;
  pointer-events:none;
}
.vr-card-content{ position:relative; z-index:1; }
.vr-card-header-line{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.vr-card-title{ margin:0 0 3px; font-size:16px; }
.vr-card-text{ margin:0; font-size:13px; color: var(--vr-text-muted); }

button.vr-card{
  appearance:none;
  -webkit-appearance:none;
  border: 1px solid var(--vr-card-border);
  background: rgba(15, 23, 42, 0.9);
  color: inherit;
  font: inherit;
  text-align:left;
}
button.vr-card:focus-visible{
  outline: 2px solid rgba(255,255,255,0.65);
  outline-offset: 3px;
}

/* Tooltip */
.vr-tooltip{
  position: fixed;
  transform: translateX(-50%);
  width: min(360px, 88vw);
  max-width: 420px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.98);
  color: #e5e7eb;
  font-size: 12px;
  line-height: 1.35;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display:none;
  z-index:50;
  word-break: normal;
  overflow-wrap: break-word;
}

/* ==========================================================
   VUE JEU BASE
   ========================================================== */
#view-game{
  position: relative;
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 12px 12px 16px 12px;
  border-radius: 0;
  border: none;
  box-shadow: none;

  background-size: 100% 100%;
  background-position: center center;
  background-repeat: no-repeat;
  background-image: var(--vr-universe-bg);

  overflow: hidden;
}

#view-game::before{
  content:"";
  position:absolute;
  inset:0;
  background: transparent;
  pointer-events:none;
  z-index:0;
}

#view-game > *:not(.vr-ending-overlay):not(.vr-popup):not(.vr-token-gauge-overlay){
  position: relative;
  z-index:1;
}

/* ==========================================================
   JAUGES
   ========================================================== */
.vr-gauges-row{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}
.vr-gauge{ display:flex; align-items:center; gap:8px; }
.vr-gauge-label{ font-size:16px; font-weight:900; min-width:72px; }

/* % actuel + delta */
.vr-gauge-value{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-width:64px;
  font-size:13px;
  line-height:1.1;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}
.vr-gauge-val{ font-weight:900; letter-spacing:0.2px; }
.vr-gauge-delta{ font-weight:900; opacity:.95; }
body:not(.vr-peek-mode) .vr-gauge-delta{ display:none; }

.vr-gauge-frame{
  position:relative;
  width: var(--vr-gauge-size, 84px);
  height: var(--vr-gauge-size, 84px);
  flex:0 0 auto;
  background-size: contain;
  background-position:center;
  background-repeat:no-repeat;
  transform: translateZ(0);
}

.vr-gauge-fill,
.vr-gauge-preview{
  position:absolute;
  inset:0;
  background-size: contain;
  background-position:center;
  background-repeat:no-repeat;
  pointer-events:none;
  clip-path: inset(calc(100% - var(--vr-pct, 50%)) 0 0 0);
}
.vr-gauge-preview{
  opacity:0.35;
  filter: saturate(1.05) brightness(1.05);
}
.vr-gauge-fill{ opacity:1; }

/* ==========================================================
   CARTE + CHOIX
   ========================================================== */
.vr-card-container{ display:flex; justify-content:center; margin-top:8px; width:100%; }
body.vr-body-game .vr-card-container{ justify-content:center !important; }

.vr-card-stack{
  width:100%;
  max-width: min(640px, 96vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.vr-card-main{
  position:relative;
  width:100%;
  max-width: min(640px, 96vw);
  margin:0 auto;
  background-size: 100% 100%;
  background-position:center;
  background-repeat:no-repeat;
  background-image: var(--vr-universe-card);
  padding: 26px 30px;
  border:none;
  box-shadow:none;
}
.vr-card-main.vr-card-dragging{ transition:none; }

body.vr-body-game .vr-card-main{
  padding:
    var(--vr-scn-inset-top, 14%)
    var(--vr-scn-inset-right, 10%)
    var(--vr-scn-inset-bottom, 14%)
    var(--vr-scn-inset-left, 10%) !important;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

body.vr-body-game .vr-card-main .vr-card-title,
body.vr-body-game .vr-card-main .vr-card-text{
  width:100%;
  max-width: 100%;
  margin-left:0;
  margin-right:0;
  text-align:center;
}

body.vr-body-game .vr-card-main .vr-card-title{
  margin: 0 0 10px;
  line-height: 1.15;
  font-size: var(--vr-font-scn-title);
}
body.vr-body-game .vr-card-main .vr-card-text{
  margin:0;
  line-height:1.35;
  font-size: var(--vr-font-scn-text);
  color: var(--vr-text-muted);
}

.vr-card-choices{ display:flex; flex-direction:column; gap:14px; width:100%; }

.vr-choice-button{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;

  width:100%;
  max-width: min(640px, 96vw);
  margin:0 auto;

  min-height: 78px;
  padding: 12px 30px;

  background-color: transparent;
  background-size: 100% 100%;
  background-position:center;
  background-repeat:no-repeat;
  background-image: var(--vr-universe-choice);

  border:none;
  cursor:pointer;
}

.vr-choice-label{
  position:relative;
  z-index:1;
  color:#fff;
  font-size: var(--vr-font-choice);
  line-height:1.35;
  text-align:center;
  width:100%;
  max-width: var(--vr-choice-safe, 88%);
  margin:0 auto;
  padding: 8px 0;
  display:block;
  word-break: break-word;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}

body.vr-body-game .vr-choice-button{
  padding: 0 !important;
  overflow: hidden;
}

body.vr-body-game .vr-choice-label{
  position:absolute !important;
  inset:
    var(--vr-choice-inset-top, 18%)
    var(--vr-choice-inset-right, 10%)
    var(--vr-choice-inset-bottom, 18%)
    var(--vr-choice-inset-left, 10%) !important;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;

  width:auto !important;
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
}

/* ==========================================================
   FIN
   ========================================================== */
.vr-ending-overlay{
  position: fixed !important;
  inset: 0 !important;
  background: rgba(15, 23, 42, 0.85) !important;
  display: none !important;
  align-items: center !important;
  justify-content: center !important;
  z-index: 250000 !important;
  padding:
    max(12px, env(safe-area-inset-top))
    12px
    max(12px, env(safe-area-inset-bottom))
    12px !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
}

.vr-ending-overlay.vr-ending-visible{
  display: flex !important;
}

.vr-ending-card{
  width: min(420px, calc(100vw - 24px)) !important;
  max-width: 100% !important;
  max-height: calc(100svh - 24px) !important;
  overflow-y: auto !important;
  box-sizing: border-box !important;

  padding: clamp(14px, 3.6vw, 20px) !important;
  border-radius: clamp(16px, 4vw, 22px) !important;
  background: rgba(15, 23, 42, 0.98) !important;
  border: 1px solid rgba(209,213,219,0.5) !important;
  box-shadow: var(--vr-shadow-soft) !important;
  text-align: center !important;
}

.vr-ending-title{
  margin: 0 0 8px !important;
  font-size: clamp(18px, 4.8vw, 24px) !important;
  text-align: center !important;
}

.vr-ending-text{
  margin: 0 0 10px !important;
  font-size: clamp(12px, 3.4vw, 14px) !important;
  line-height: 1.35 !important;
  text-align: center !important;
  color: var(--vr-text-muted) !important;
}

/* ==========================================================
   FIN DE REGNE — boutons
   ========================================================== */
#vr-ending-overlay .vr-choice-button{
  background-image: none !important;
  background: rgba(255,255,255,0.08) !important;
  border: 1px solid rgba(255,255,255,0.14) !important;
  border-radius: 16px !important;
  box-shadow: 0 14px 26px rgba(0,0,0,0.24) !important;

  min-height: clamp(48px, 12vw, 56px) !important;
  padding: 10px 12px !important;

  width: 100% !important;
  max-width: none !important;

  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  overflow: hidden !important;

  color: #ffffff !important;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
  font-size: clamp(13px, 3.8vw, 16px) !important;
  font-weight: 800 !important;
  line-height: 1.2 !important;
  text-align: center !important;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35) !important;
}

#vr-ending-overlay .vr-choice-button span{
  position: static !important;
  inset: auto !important;
  width: auto !important;
  max-width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;

  display: block !important;
  text-align: inherit !important;
  color: inherit !important;
  font-family: inherit !important;
  font-size: inherit !important;
  font-weight: inherit !important;
  line-height: inherit !important;
  text-shadow: inherit !important;

  white-space: normal !important;
  overflow-wrap: anywhere !important;
}

/* ligne gain : sans cartouche */
#vr-ending-overlay .vr-ending-reward{
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;

  padding: 0 !important;
  margin: 2px 0 6px !important;

  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}

#vr-ending-overlay .vr-ending-reward img{
  width: clamp(24px, 7vw, 30px) !important;
  height: clamp(24px, 7vw, 30px) !important;
  object-fit: contain !important;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.28)) !important;
  transform: translateY(2px) !important;
}

#vr-ending-overlay .vr-ending-reward strong{
  font-size: clamp(18px, 4.8vw, 22px) !important;
  font-weight: 950 !important;
  letter-spacing: .2px !important;
  line-height: 1 !important;
}

#vr-ending-overlay .vr-ending-double{
  position: relative !important;
  overflow: hidden !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 4px !important;
  width: 100% !important;
  min-height: clamp(72px, 14vw, 92px) !important;
  padding: 12px 14px !important;
  margin-top: 4px !important;
  border: 1px solid rgba(255,255,255,.14) !important;
  border-radius: 18px !important;
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05)) !important;
  box-shadow: 0 18px 34px rgba(0,0,0,.28) !important;
  color: #fff !important;
  font: inherit !important;
  cursor: pointer !important;
}

#vr-ending-overlay .vr-ending-double-title{
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;
  font-size: clamp(16px, 4.5vw, 20px) !important;
  font-weight: 950 !important;
  line-height: 1.05 !important;
}

#vr-ending-overlay .vr-ending-double-title img{
  width: clamp(24px, 6.5vw, 32px) !important;
  height: clamp(24px, 6.5vw, 32px) !important;
  object-fit: contain !important;
}

#vr-ending-overlay .vr-ending-double-sub{
  font-size: clamp(11px, 3vw, 13px) !important;
  font-weight: 800 !important;
  line-height: 1.25 !important;
  opacity: .92 !important;
}

#vr-ending-overlay .vr-ending-actions{
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
  margin-top: 10px !important;
}

#vr-ending-overlay .vr-ending-actions-bottom{
  display: grid !important;
  grid-template-columns: 1fr 1fr !important;
  gap: 10px !important;
  margin-top: 0 !important;
}

#vr-ending-overlay #ending-revive-btn{
  margin-bottom: 0 !important;
}

@media (max-width: 480px){
  #vr-ending-overlay .vr-ending-actions-bottom{
    grid-template-columns: 1fr !important;
  }
}

/* ==========================================================
   POPUP JETON — police de base forcée
   ========================================================== */
.vr-popup,
.vr-popup *{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}
.vr-token-gauge-overlay,
.vr-token-gauge-overlay *{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}

.vr-popup{
  position: fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.58);
  z-index:200000;
  padding:18px;
}

.vr-popup-inner{
  width: min(560px, 94vw);

/* ==========================================================
   GAME — plein écran + pas de scroll + layout serré
   ========================================================== */
body.vr-body-game{
  overflow: hidden;

  --vr-topbar-h: calc(var(--vr-top-btn) + clamp(14px, 2.2vh, 18px) + env(safe-area-inset-top));

  --vr-gauge-size: clamp(58px, 15vw, 108px);
  --vr-card-w: clamp(360px, 96vw, 980px);

  --vr-scn-h: clamp(132px, 18svh, 280px);
  --vr-choice-h: clamp(84px, 12.8svh, 210px);

  --vr-scn-inset-top: 14%;
  --vr-scn-inset-right: 10%;
  --vr-scn-inset-bottom: 14%;
  --vr-scn-inset-left: 10%;

  --vr-choice-inset-top: 18%;
  --vr-choice-inset-right: 10%;
  --vr-choice-inset-bottom: 18%;
  --vr-choice-inset-left: 10%;

  --vr-game-gap: clamp(1px, 0.25svh, 4px);
  --vr-stack-gap: clamp(4px, 0.55svh, 8px);
  --vr-choices-gap: clamp(6px, 0.7svh, 10px);
}

body.vr-body-game .vr-game-header{ display:none !important; }

body.vr-body-game .vr-main{
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
  width:100vw !important;
  height:100vh !important;
  overflow:hidden !important;
}

body.vr-body-game #view-game{
  position: fixed;
  inset: 0;
  width:100%;
  height:100svh;
  min-height:100svh;
  margin:0;

  padding:
    var(--vr-topbar-h)
    clamp(10px, 3.4vw, 18px)
    clamp(8px, 1.2svh, 12px)
    clamp(10px, 3.4vw, 18px) !important;

  border-radius:0;
  border:none;
  box-shadow:none;
  overflow:hidden !important;

  display:grid !important;
  grid-template-rows: auto auto 1fr;
  row-gap: var(--vr-game-gap) !important;
}

body.vr-body-game #view-game .vr-hud{ grid-row: 1; }
body.vr-body-game #view-game .vr-gauges-row{ grid-row: 2; }
body.vr-body-game #view-game .vr-card-container{ grid-row: 3; }

body.vr-body-game .vr-gauges-row{
  width:100%;
  max-width: 980px;
  margin: 0 auto 0 !important;
  display:grid !important;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: clamp(8px, 2.2vw, 14px);
}

body.vr-body-game .vr-gauge{
  flex-direction:column;
  align-items:center;
  gap:6px;
}
body.vr-body-game .vr-gauge-label{
  font-size: clamp(11px, 2.1vmin, 15px);
  min-width:0;
  text-align:center;
  min-height: 2.0em;
  line-height:1.15;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 0 2px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}

body.vr-body-game .vr-card-container{
  min-height:0;
  display:flex;
  align-items:flex-start;
  justify-content:center !important;
  margin-top: 0 !important;
}

body.vr-body-game .vr-card-stack{
  width: min(100%, var(--vr-card-w)) !important;
  max-width:none !important;
  margin-inline:auto !important;
  align-self:stretch !important;
  gap: var(--vr-stack-gap) !important;
  min-height:0;
}

body.vr-body-game .vr-card-main{
  width:100% !important;
  max-width:none !important;
  margin-inline:auto !important;
  min-height: var(--vr-scn-h) !important;
  background-size: 100% 100% !important;
  padding:
    var(--vr-scn-inset-top)
    var(--vr-scn-inset-right)
    var(--vr-scn-inset-bottom)
    var(--vr-scn-inset-left) !important;
}

body.vr-body-game .vr-card-choices{ gap: var(--vr-choices-gap) !important; }
body.vr-body-game .vr-choice-button{
  width:100% !important;
  max-width:none !important;
  margin-inline:auto !important;
  min-height: var(--vr-choice-h) !important;
  background-size: 100% 100% !important;
}

/* ==========================================================
   TOP ICONS (GAME) — fixed
   ========================================================== */
body.vr-body-game .vr-top-actions-game{
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  z-index: 100000 !important;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  flex-wrap:nowrap !important;

  gap: clamp(8px, 2.2vw, 16px) !important;
  padding: calc(clamp(8px, 1.1vh, 12px) + env(safe-area-inset-top)) 16px 6px !important;

  pointer-events:none !important;
}
body.vr-body-game .vr-top-actions-game .vr-icon-button{
  pointer-events:auto !important;
  width: var(--vr-top-btn) !important;
  height: var(--vr-top-btn) !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
}
body.vr-body-game .vr-top-actions-game .vr-top-icon{
  width: var(--vr-top-icon) !important;
  height: var(--vr-top-icon) !important;
  max-width: var(--vr-top-icon) !important;
  max-height: var(--vr-top-icon) !important;
  object-fit: contain !important;
  display:block !important;
}

   ================================================================================================= */

/* =========================
   0) DEFAULTS UI CHROME (fallback)
   ========================= */
body.vr-body-game{
  --vr-ui-topbar-img: none;
  --vr-ui-hud-img: none;
  --vr-ui-back-img: none;
  --vr-ui-customize-img: none;

  --vr-ui-topbar-w: clamp(220px, 54vw, 420px);
  --vr-ui-topbar-r: 0.275;
  --vr-ui-back-size: clamp(46px, 11vw, 76px);
  --vr-ui-customize-size: clamp(46px, 11vw, 76px);
  --vr-ui-hud-w: min(94vw, 980px);

  --vr-ui-topbar-top: 14px;
  --vr-ui-back-top: 18px;
  --vr-ui-back-left: 20px;
  --vr-ui-customize-top: 18px;
  --vr-ui-customize-right: 20px;

  --vr-ui-topbtn-top: 16%;
  --vr-ui-topbtn-w: 17%;
  --vr-ui-topbtn-h: 72%;
  --vr-ui-topbtn-1-left: 16%;
  --vr-ui-topbtn-2-left: 41%;
  --vr-ui-topbtn-3-left: 66%;

  --vr-hud-left-x: 3.3%;
  --vr-hud-left-w: 17.8%;
  --vr-hud-center-l: 20.2%;
  --vr-hud-center-r: 20.2%;
  --vr-hud-right-r: 5.3%;
  --vr-hud-right-w: 17.8%;
  --vr-hud-item-ty: -11px;

  --vr-identity-tx: 0px;
  --vr-identity-ty: 0px;
  --vr-hud-name-years-gap: clamp(14px, 2.4vw, 24px);

  --vr-vcoins-tx: 0px;
  --vr-vcoins-ty: -2px;
  --vr-jetons-tx: 0px;
  --vr-jetons-ty: -2px;

  --vr-vcoins-color: #FFD166;
  --vr-vcoins-glow:  rgba(255, 209, 102, .62);
  --vr-vcoins-bg:    transparent;

  --vr-jetons-color: #F3F4F6;
  --vr-jetons-glow:  rgba(243, 244, 246, .18);
  --vr-jetons-bg:    transparent;

  --vr-scn-inset-top: 14%;
  --vr-scn-inset-right: 10%;
  --vr-scn-inset-bottom: 14%;
  --vr-scn-inset-left: 10%;

  --vr-choice-inset-top: 18%;
  --vr-choice-inset-right: 10%;
  --vr-choice-inset-bottom: 18%;
  --vr-choice-inset-left: 10%;
}

/* =========================
   1) APPLY UI CHROME
   ========================= */
body.vr-body-game{
  --vr-topbar-h: calc((var(--vr-ui-topbar-w) * var(--vr-ui-topbar-r)) + env(safe-area-inset-top) + 8px);
}

body.vr-body-game .vr-top-actions-game{
  position: fixed !important;
  top: calc(var(--vr-ui-topbar-top) + env(safe-area-inset-top)) !important;
  left: 50% !important;
  right: auto !important;
  transform: translateX(-50%) !important;

  width: var(--vr-ui-topbar-w) !important;
  height: calc(var(--vr-ui-topbar-w) * var(--vr-ui-topbar-r)) !important;

  padding: 0 !important;
  margin: 0 !important;
  gap: 0 !important;

  display: block !important;
  pointer-events: none !important;
  z-index: 100000 !important;
}

body.vr-body-game .vr-top-actions-game::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-topbar-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game .vr-top-actions-game .vr-top-icon{ display:none !important; }

body.vr-body-game .vr-top-actions-game .vr-icon-button{
  position:absolute !important;
  top: var(--vr-ui-topbtn-top) !important;
  width: var(--vr-ui-topbtn-w) !important;
  height: var(--vr-ui-topbtn-h) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:1 !important;
}
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(1){ left: var(--vr-ui-topbtn-1-left) !important; }
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(2){ left: var(--vr-ui-topbtn-2-left) !important; }
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(3){ left: var(--vr-ui-topbtn-3-left) !important; }

body.vr-body-game > a.vr-icon-button[aria-label="Accueil"]{
  position: fixed !important;
  top: calc(var(--vr-ui-back-top) + env(safe-area-inset-top)) !important;
  left: var(--vr-ui-back-left) !important;
  width: var(--vr-ui-back-size) !important;
  height: var(--vr-ui-back-size) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  z-index:100002 !important;
  pointer-events:auto !important;
}
body.vr-body-game > a.vr-icon-button[aria-label="Accueil"] .vr-top-icon{ display:none !important; }
body.vr-body-game > a.vr-icon-button[aria-label="Accueil"]::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-back-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game #btn-customize{
  position: fixed !important;
  top: calc(var(--vr-ui-customize-top) + env(safe-area-inset-top)) !important;
  right: var(--vr-ui-customize-right) !important;
  width: var(--vr-ui-customize-size) !important;
  height: var(--vr-ui-customize-size) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  z-index:100002 !important;
  pointer-events:auto !important;
}
body.vr-body-game #btn-customize .vr-top-icon{ display:none !important; }
body.vr-body-game #btn-customize::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-customize-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game .vr-hud{
  position: relative !important;
  width: var(--vr-ui-hud-w) !important;
  max-width:none !important;
  margin:0 auto !important;
  padding:0 !important;
  display:block !important;
  white-space: normal !important;

  aspect-ratio: 1024 / 269;
  background: var(--vr-ui-hud-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,0.20));
}

body.vr-body-game .vr-hud-left,
body.vr-body-game .vr-hud-center,
body.vr-body-game .vr-hud-right{
  position:absolute !important;
  top:0 !important;
  bottom:0 !important;
  min-width:0 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  transform:none !important;
  justify-self:auto !important;
}
body.vr-body-game .vr-hud-left{
  left: var(--vr-hud-left-x) !important;
  width: var(--vr-hud-left-w) !important;
}
body.vr-body-game .vr-hud-center{
  left: var(--vr-hud-center-l) !important;
  right: var(--vr-hud-center-r) !important;
}
body.vr-body-game .vr-hud-right{
  right: var(--vr-hud-right-r) !important;
  width: var(--vr-hud-right-w) !important;
}

body.vr-body-game .vr-hud-item{
  width:100% !important;
  height:100% !important;
  min-height:0 !important;
  padding:0 !important;
  gap:0 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  background: transparent !important;
  border: none !important;
  box-shadow:none !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
  transform: translateY(var(--vr-hud-item-ty)) !important;
  position: relative !important;
}

body.vr-body-game .vr-hud-item .vr-hud-icon-btn{
  position:absolute !important;
  inset:0 !important;
  width:auto !important;
  height:auto !important;
  min-width:0 !important;
  min-height:0 !important;
  padding:0 !important;
  margin:0 !important;
  background:transparent !important;
  border-radius:999px !important;
  z-index:50 !important;
  cursor:pointer !important;
  pointer-events:auto !important;
  font-size:0 !important;
  line-height:0 !important;
}

body.vr-body-game .vr-hud-item .vr-hud-icon{ display:none !important; }

body.vr-body-game .vr-hud-item .vr-hud-value{
  position: relative !important;
  z-index: 3 !important;
  pointer-events:none !important;
  text-align:center !important;
}

body.vr-body-game .vr-hud-identity{
  gap: var(--vr-hud-name-years-gap) !important;
  transform: translate(var(--vr-identity-tx), var(--vr-identity-ty)) !important;
}

body.vr-body-game .vr-hud-left .vr-hud-value{
  transform: translate(var(--vr-vcoins-tx), var(--vr-vcoins-ty)) !important;
  color: var(--vr-vcoins-color) !important;
  text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 14px var(--vr-vcoins-glow) !important;
}
body.vr-body-game .vr-hud-right .vr-hud-value{
  transform: translate(var(--vr-jetons-tx), var(--vr-jetons-ty)) !important;
  color: var(--vr-jetons-color) !important;
  text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 14px var(--vr-jetons-glow) !important;
}

body.vr-body-game .vr-hud-left .vr-hud-item{ background: var(--vr-vcoins-bg) !important; }
body.vr-body-game .vr-hud-right .vr-hud-item{ background: var(--vr-jetons-bg) !important; }

body.vr-body-game .vr-card-main{
  padding:
    var(--vr-scn-inset-top)
    var(--vr-scn-inset-right)
    var(--vr-scn-inset-bottom)
    var(--vr-scn-inset-left) !important;
}
body.vr-body-game .vr-choice-label{
  inset:
    var(--vr-choice-inset-top)
    var(--vr-choice-inset-right)
    var(--vr-choice-inset-bottom)
    var(--vr-choice-inset-left) !important;
}

le": "Le parfum de soleil", "body": "Les humains s’en tartinent avec joie. Toi, tu sens que ton immortalité vient de perdre un peu de confort.", "choices": {"A": "Identifier l’ingrédient", "B": "Interdire son usage près du repaire", "C": "Déplacer la zone de chasse"}}, "vampire_098": {"title": "La bague du serment", "body": "Cette bague ne revient jamais sans raison. Elle annonce une promesse, ou une menace. Parfois les deux.", "choices": {"A": "La sceller", "B": "La porter", "C": "Chercher qui l’a déposée"}}, "vampire_099": {"title": "Le voisin jardinier", "body": "Il est gentil, souriant, et il adore les pellettes. Tout ce que tu détestes en ce moment.", "choices": {"A": "Le détourner avec un cadeau", "B": "Modifier l’entrée secrète", "C": "Le faire déménager"}}, "vampire_100": {"title": "Le silence radio", "body": "Quand un vampire disparaît, ce n’est jamais un hasard. Soit un piège, soit une trahison. Ou les deux.", "choices": {"A": "Envoyer une équipe", "B": "Attendre et observer", "C": "Supposer le pire et riposter"}}, "vampire_101": {"title": "Le marché aux antiques", "body": "Le vendeur dit que ça vient d’une cave. Bien sûr. Les caves ont toujours bon dos.", "choices": {"A": "L’acheter discrètement", "B": "La voler cette nuit", "C": "Piéger le vendeur"}}, "vampire_102": {"title": "Le secret veut un logo", "body": "Ils veulent une identité visible. Toi, tu veux surtout qu’ils restent invisibles.", "choices": {"A": "Donner un symbole simple", "B": "Refuser et calmer", "C": "Créer un faux symbole piégé"}}, "vampire_103": {"title": "Le caméraman insomniaque", "body": "Il adore les ombres, les ruelles, les silhouettes. Il est à deux pas de filmer la mauvaise silhouette.", "choices": {"A": "Le convaincre d’arrêter", "B": "Saboter son matériel", "C": "Utiliser ses images comme couverture"}}, "vampire_104": {"title": "Le nouveau code du clan", "body": "La réunion dure une éternité. Ce qui est ironique, vu que vous avez justement l’éternité.", "choices": {"A": "Approuver les anciens", "B": "Moderniser doucement", "C": "Imposer un compromis"}}, "vampire_105": {"title": "La plainte du quartier", "body": "Une pétition circule. Les humains ont peur. Les regards se tournent vers toi.", "choices": {"A": "Calmer le quartier", "B": "Effrayer les voisins", "C": "Changer de repaire"}}, "vampire_106": {"title": "Le téléphone oublié", "body": "Le téléphone contient des photos et des messages. Une vraie menace pour le secret.", "choices": {"A": "Récupérer le téléphone vite", "B": "Le détruire", "C": "Le fouiller et surveiller"}}, "vampire_107": {"title": "Le sac de sang percé", "body": "Une traînée rouge comme un fil d’Ariane. Sauf que ton labyrinthe a des crocs.", "choices": {"A": "Suivre la trace", "B": "Punir tout le monde", "C": "Installer des contrôles"}}, "vampire_108": {"title": "La visite surprise", "body": "Il sourit comme un roi en voyage. Il regarde ton repaire comme si tout lui appartenait déjà.", "choices": {"A": "L’accueillir avec respect", "B": "Le faire patienter dehors", "C": "Préparer un piège poli"}}, "vampire_109": {"title": "Le chasseur blessé", "body": "Il saigne, il tremble, mais il garde sa haine. Un animal blessé mord plus fort.", "choices": {"A": "Le capturer", "B": "Le soigner pour négocier", "C": "Le livrer à un rival"}}, "vampire_110": {"title": "La panne de serrure", "body": "Une porte ouverte, c’est une invitation. Et toi, tu n’aimes pas les invités.", "choices": {"A": "Réparer immédiatement", "B": "Mettre des gardes", "C": "Condamner la zone"}}, "vampire_111": {"title": "Le parfum du mensonge", "body": "Le mensonge a une odeur. Tu la connais trop bien. La question, c’est pourquoi il ment maintenant.", "choices": {"A": "Le confronter", "B": "Le tester en silence", "C": "Le laisser parler et le piéger"}}, "vampire_112": {"title": "La rumeur du remède", "body": "Un remède fait rêver certains et paniquer les autres. Les chasseurs surveillent déjà.", "choices": {"A": "Chercher le remède", "B": "Détruire la rumeur", "C": "L’utiliser pour manipuler"}}, "vampire_113": {"title": "Le bus de nuit", "body": "Chaque nuit, des fenêtres pleines d’yeux. Les yeux regardent. Un jour, ils verront.", "choices": {"A": "Faire changer le trajet", "B": "Camoufler l’entrée", "C": "Exploiter le bus"}}, "vampire_114": {"title": "Le serveur trop bavard", "body": "Il dit que tu es mystérieux. Il mime ta démarche. Il ajoute des détails. Les détails sont des couteaux.", "choices": {"A": "Le recadrer gentiment", "B": "Le renvoyer", "C": "En faire un appât"}}, "vampire_115": {"title": "Le colis anonyme", "body": "Le colis ne sent pas l’humain. Il sent l’ancien. Et il est arrivé trop facilement jusqu’à toi.", "choices": {"A": "Ouvrir avec précaution", "B": "Le brûler", "C": "Le donner à analyser"}}, "vampire_116": {"title": "La réunion des chasseurs", "body": "Ils ne se cachent même pas. Quand un ennemi devient confiant, il prépare quelque chose.", "choices": {"A": "Infiltrer la réunion", "B": "Frapper avant", "C": "Déplacer tout le clan"}}, "vampire_117": {"title": "Le musicien nocturne", "body": "Il joue trop bien. Comme s’il voulait attirer quelqu’un. La question, c’est qui.", "choices": {"A": "Le faire partir", "B": "Le recruter", "C": "Le laisser et observer"}}, "vampire_118": {"title": "La carte perdue", "body": "Le fidèle dit qu’il l’a trouvée par hasard. Le hasard a de l’humour, mais toi, non.", "choices": {"A": "Récupérer la carte", "B": "Changer les tunnels", "C": "Faire croire à une fausse carte"}}, "vampire_119": {"title": "Le sang rare", "body": "Le clan se dispute comme des enfants. Sauf que les enfants n’ont pas de crocs et de rancunes centenaires.", "choices": {"A": "Le réserver au conseil", "B": "Le partager équitablement", "C": "Le garder pour toi"}}, "vampire_120": {"title": "La salle interdite", "body": "Il est pâle, même pour un vampire. Il dit qu’il a entendu un souffle derrière le mur.", "choices": {"A": "Le punir", "B": "L’écouter et enquêter", "C": "Lui faire oublier"}}, "vampire_121": {"title": "Le contrat de sécurité", "body": "Plus de caméras, c’est plus de preuves. Mais contrôler les caméras, c’est contrôler le récit.", "choices": {"A": "Refuser et saboter", "B": "Accepter et contrôler", "C": "Racheter la société"}}, "vampire_122": {"title": "Le parfum des roses", "body": "Tu dois rester immobile toute une journée dans un cercueil de transport. C’est aussi une vraie épreuve.", "choices": {"A": "Faire arracher les roses", "B": "Se protéger et s’adapter", "C": "Changer l’entrée secrète"}}, "vampire_123": {"title": "Le peintre obsédé", "body": "Il dit que ton regard est unique. Il veut te peindre à la lumière. Mauvaise idée.", "choices": {"A": "Refuser fermement", "B": "Accepter mais contrôler", "C": "Le faire partir du quartier"}}, "vampire_124": {"title": "La dette du secret", "body": "Ils ont aidé une fois. Maintenant ils se croient intouchables.", "choices": {"A": "Payer en dons", "B": "Donner un privilège", "C": "Refuser et calmer"}}, "vampire_125": {"title": "Le garde du corps humain", "body": "Il est loyal, compétent, et trop curieux. Trois qualités qui finissent mal ensemble.", "choices": {"A": "Le garder mais limiter", "B": "Le renvoyer", "C": "Le transformer en allié"}}, "vampire_126": {"title": "La lampe trop forte", "body": "Une simple lampe change tout. Les humains aiment la lumière. Toi, tu la subis.", "choices": {"A": "Faire enlever la lampe", "B": "Camoufler le passage", "C": "Utiliser l’ombre ailleurs"}}, "vampire_127": {"title": "Le coffre qui grince", "body": "Le coffre n’a jamais fait de bruit. Maintenant il gémit. Et les archives ont le goût des secrets.", "choices": {"A": "Ouvrir et vérifier", "B": "Le sceller", "C": "Appeler un ancien"}}, "vampire_128": {"title": "La course-poursuite", "body": "Le moteur rugit, les phares collent, et ton calme se fissure. Quelqu’un veut te pousser à l’erreur.", "choices": {"A": "Semer la voiture", "B": "Piéger le conducteur", "C": "Rentrer au repaire par un détour"}}, "vampire_129": {"title": "La cantine du clan", "body": "Ils veulent de l’ordre et du confort. Toi, tu veux du secret et du contrôle.", "choices": {"A": "Organiser une cantine", "B": "Refuser et imposer la chasse", "C": "Créer un système de tickets"}}, "vampire_130": {"title": "Le sermon de la peur", "body": "Plus il crie, plus les gens écoutent. Plus les gens écoutent, plus les mauvaises oreilles arrivent.", "choices": {"A": "Le faire taire", "B": "Le recadrer gentiment", "C": "Utiliser sa peur comme écran"}}, "vampire_131": {"title": "Le plan du rival", "body": "Il ne te frappe pas, il t’encercle. C’est plus lent, mais c’est plus cruel.", "choices": {"A": "Acheter plus vite que lui", "B": "Négocier une frontière", "C": "Saboter ses achats"}}, "vampire_132": {"title": "La pluie acide", "body": "Ce n’est pas le soleil. C’est autre chose. Et autre chose signifie souvent piège.", "choices": {"A": "Rester au repaire", "B": "Chercher la source", "C": "Envoyer des éclaireurs"}}, "vampire_133": {"title": "Le pacte des pharmacies", "body": "Des pharmacies veulent associer ton image à leur campagne. Elles demandent des photos, des interviews et une présence publique.", "choices": {"A": "Accepter pour le contrôle", "B": "Refuser et rester discret", "C": "Accepter mais via un écran"}}, "vampire_134": {"title": "Le vampire végétarien", "body": "Il parle de morale et de paix. Les anciens parlent de faiblesse. Toi, tu parles de stabilité.", "choices": {"A": "Le soutenir", "B": "Le bannir", "C": "Le surveiller"}}, "vampire_135": {"title": "Le cadenas en argent", "body": "L’argent pique rien qu’en le regardant. Quelqu’un a voulu te ralentir, pas te tuer. Pas encore.", "choices": {"A": "Le briser", "B": "Le faire analyser", "C": "Contourner la porte"}}, "vampire_136": {"title": "La fuite d’eau", "body": "L’eau attire des ouvriers. Les ouvriers posent trop de questions.", "choices": {"A": "Réparer vite", "B": "Condamner la salle", "C": "Déplacer le contenu"}}, "vampire_137": {"title": "Le dernier train", "body": "Une simple heure change la chasse, les déplacements, le timing. Et toi, tu vis de timing.", "choices": {"A": "Changer de route", "B": "Créer un passage", "C": "Contrôler la gare"}}, "vampire_138": {"title": "La vitre cassée", "body": "Une vitre cassée, c’est une entrée. Ou un message. Et tu n’aimes ni l’un ni l’autre.", "choices": {"A": "Interroger tout le monde", "B": "Renforcer la sécurité", "C": "Accuser un ennemi"}}, "vampire_139": {"title": "Le stagiaire en blouse", "body": "Il est jeune, malin, et motivé. Le pire type de personne quand on veut rester caché.", "choices": {"A": "Le recruter", "B": "Le faire taire", "C": "Changer de circuit"}}, "vampire_140": {"title": "La lettre parfumée", "body": "Ce parfum n’est pas humain. Il te rappelle une époque où tu étais moins puissant. Donc plus prudent.", "choices": {"A": "La brûler", "B": "La lire avec protection", "C": "La confier au secret"}}, "vampire_141": {"title": "Le masque de carnaval", "body": "Pour une fois, tu peux marcher sans attirer l’attention. Pour une fois. Et ça rend les chasseurs nerveux.", "choices": {"A": "Profiter de la confusion", "B": "Fermer le repaire", "C": "Contrôler les rues"}}, "vampire_142": {"title": "Le garde qui sourit", "body": "Il ne recule pas. Il te fait un signe. Il sait. Ou il joue. Dans les deux cas, c’est dangereux.", "choices": {"A": "L’intimider", "B": "Le suivre discrètement", "C": "Changer de plan"}}, "vampire_143": {"title": "La cave condamnée", "body": "Panneaux, rubans, cadenas. Les humains adorent fermer les portes. Toi, tu adores les rouvrir.", "choices": {"A": "Corrompre l’inspection", "B": "Ouvrir un autre accès", "C": "Forcer l’accès la nuit"}}, "vampire_144": {"title": "Le pacte du silence", "body": "Il a peur et risque de parler. Tu dois choisir quel risque prendre.", "choices": {"A": "Accepter et protéger", "B": "Refuser et le surveiller", "C": "Le remplacer"}}, "vampire_145": {"title": "La poussière sacrée", "body": "Ce n’est pas une attaque directe. C’est un test. Quelqu’un mesure ta réaction.", "choices": {"A": "Nettoyer et enquêter", "B": "Faire un rite de protection", "C": "Répliquer avec un avertissement"}}, "vampire_146": {"title": "Le banquet obligatoire", "body": "Un banquet donne du pouvoir, mais expose aussi tes faiblesses.", "choices": {"A": "Organiser un banquet grandiose", "B": "Refuser et assumer", "C": "Faire un banquet discret"}}, "vampire_147": {"title": "Le voleur de fonds", "body": "L’argent ne sent pas le sang, mais il fait couler des larmes. Et des larmes chez un vampire, c’est rare.", "choices": {"A": "Auditer les comptes", "B": "Piéger la caisse", "C": "Accuser un rival"}}, "vampire_148": {"title": "Le journaliste de nuit", "body": "Il aime les histoires sombres. Il va finir par en écrire une vraie. Sur toi.", "choices": {"A": "Le corrompre", "B": "Le détourner", "C": "Le faire taire"}}, "vampire_149": {"title": "La bougie qui ne s’éteint pas", "body": "La flamme danse comme si elle te regardait. Une flamme qui regarde, c’est rarement bon.", "choices": {"A": "L’éteindre par la force", "B": "Comprendre le rituel", "C": "Sceller la salle"}}, "vampire_150": {"title": "Le chien qui grogne", "body": "Un chien peut alerter tout un immeuble. Et les humains se réveillent très vite quand un chien panique.", "choices": {"A": "Éviter la zone", "B": "Apprivoiser le chien", "C": "Faire peur au propriétaire"}}, "vampire_151": {"title": "Le miroir de poche", "body": "Dans ce miroir, tu n’existes pas. Ça amuse certains. Toi, tu sais que ça attire les curieux.", "choices": {"A": "Le détruire", "B": "Le garder comme indice", "C": "Chercher le propriétaire"}}, "vampire_152": {"title": "La porte qui frappe", "body": "Trois coups, toujours à la même heure. Une routine, c’est une menace quand elle vient d’un ennemi.", "choices": {"A": "Ouvrir et confronter", "B": "Piéger l’entrée", "C": "Ignorer et surveiller"}}, "vampire_153": {"title": "Le serment du jeune", "body": "Il veut faire bien. Il veut être utile. Un vampire trop pressé fait souvent une erreur visible.", "choices": {"A": "Accepter le serment", "B": "Le repousser", "C": "Le tester d’abord"}}, "vampire_154": {"title": "La piqûre étrange", "body": "Quelqu’un a une arme capable de te toucher. Pas de te tuer, pas encore. Mais de te faire douter.", "choices": {"A": "Chercher l’antidote", "B": "Isoler le vampire", "C": "Traquer l’auteur"}}, "vampire_155": {"title": "La fête des voisins", "body": "Musique, rires, verres cassés. Et toi, tu dois passer sous leurs pieds comme un secret nerveux.", "choices": {"A": "Interrompre la fête", "B": "Attendre la fin", "C": "Créer une diversion ailleurs"}}, "vampire_156": {"title": "Le bruit sous la pierre", "body": "Grattement, souffle, silence. Les trois étapes d’un problème qui grandit.", "choices": {"A": "Ouvrir et voir", "B": "Sceller et oublier", "C": "Envoyer un éclaireur"}}, "vampire_157": {"title": "Le conseiller corrompu", "body": "Il a compris que tu avais des secrets. Les humains deviennent courageux quand ils sentent l’argent.", "choices": {"A": "Payer et contrôler", "B": "Le remplacer", "C": "Le détruire politiquement"}}, "vampire_158": {"title": "La chasse de trop", "body": "Un territoire sans humains, c’est une tombe. Tu ne veux pas régner sur une tombe vide.", "choices": {"A": "Ralentir la chasse", "B": "Changer de territoire", "C": "Ramener les humains par des promesses"}}, "vampire_159": {"title": "Le livre interdit revient", "body": "Quelqu’un a voulu que tu lises ça. Ce n’est jamais bon signe.", "choices": {"A": "Lire la page", "B": "Brûler le livre", "C": "Chercher qui l’a posé"}}, "vampire_160": {"title": "La chambre froide", "body": "Le froid n’est pas normal. Il mord la pierre, il tue la flamme, il rend les serviteurs muets.", "choices": {"A": "Couper l’électricité", "B": "Explorer l’origine", "C": "Déplacer le stock"}}, "vampire_161": {"title": "Le duel demandé", "body": "Il veut te provoquer devant tous. Un duel attire toujours trop de regards.", <script>
(function () {
  "use strict";

  // === CONFIG ===
  const BASE_PATH = "data/ui";
  const DEFAULT_LANG = "en";
  const STORAGE_KEY = "vuniverse_lang";
  const LEGACY_STORAGE_KEY = "vrealms_lang";

  // ✅ on ne charge PLUS "cards" / "endings" ici
  // (les cartes et les fins sont chargées par le moteur: events-loader + VREndings)
  const UI_BUNDLES = ["ui"];

  let _lang = DEFAULT_LANG;
  let _dict = {};

  function normalizeLang(raw) {
    const s0 = String(raw || "").trim().toLowerCase();
    if (!s0) return DEFAULT_LANG;

    if (s0 === "pt-br" || s0 === "ptbr") return "ptbr";
    if (s0 === "pt-pt" || s0 === "pt_pt") return "pt";
    if (s0 === "jp" || s0 === "ja-jp") return "ja";
    if (s0 === "kr" || s0 === "ko-kr") return "ko";
    if (s0 === "in" || s0 === "id-id") return "id";

    const base = s0.split(/[-_]/)[0];
    if (base === "pt" && (s0.includes("br") || s0.includes("ptbr"))) return "ptbr";
    return base || DEFAULT_LANG;
  }

  function deepMerge(target, source) {
    if (!source || typeof source !== "object") return target;
    for (const k of Object.keys(source)) {
      const sv = source[k];
      const tv = target[k];
      if (sv && typeof sv === "object" && !Array.isArray(sv)) {
        target[k] = deepMerge(tv && typeof tv === "object" ? tv : {}, sv);
      } else {
        target[k] = sv;
      }
    }
    return target;
  }

  async function fetchJson(url) {
    const res = await fetch(url, { cache: "no-cache" });
    if (!res.ok) throw new Error(`i18n fetch failed: ${url} (${res.status})`);
    return res.json();
  }

async function tryLoadUiBundle(bundle, lang) {
  const url = `${BASE_PATH}/${bundle}_${lang}.json`;
  try {
    return await fetchJson(url);
  } catch (_) {
    return null;
  }
}
  async function loadUi(lang) {
    const l = normalizeLang(lang);

    // 1) tente la langue demandée
    const out = {};
    for (const b of UI_BUNDLES) {
      const j = await tryLoadUiBundle(b, l);
      if (j) deepMerge(out, j);
    }

    // 2) fallback sur fr si rien n’a chargé
    if (Object.keys(out).length === 0 && l !== DEFAULT_LANG) {
      for (const b of UI_BUNDLES) {
        const j = await tryLoadUiBundle(b, DEFAULT_LANG);
        if (j) deepMerge(out, j);
      }
      return { dict: out, lang: DEFAULT_LANG };
    }

    return { dict: out, lang: l };
  }

  function resolveKey(obj, key) {
    if (!obj || !key) return null;
    const parts = key.split(".");
    let cur = obj;
    for (const p of parts) {
      if (cur && Object.prototype.hasOwnProperty.call(cur, p)) cur = cur[p];
      else return null;
    }
    return cur;
  }

  function applyTranslations(dict) {
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const key = el.getAttribute("data-i18n");
      const val = resolveKey(dict, key);
      if (typeof val === "string") el.textContent = val;
    });

    document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
      const key = el.getAttribute("data-i18n-placeholder");
      const val = resolveKey(dict, key);
      if (typeof val === "string") el.setAttribute("placeholder", val);
    });

    document.querySelectorAll("[data-i18n-title]").forEach((el) => {
      const key = el.getAttribute("data-i18n-title");
      const val = resolveKey(dict, key);
      if (typeof val === "string") el.setAttribute("title", val);
    });

    document.querySelectorAll("[data-i18n-aria]").forEach((el) => {
      const key = el.getAttribute("data-i18n-aria");
      const val = resolveKey(dict, key);
      if (typeof val === "string") el.setAttribute("aria-label", val);
    });
  }

  function detectDeviceLang() {
    try {
      const list = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages
        : [navigator.language];

      for (const cand of list) {
        const l = normalizeLang(cand);
        if (l) return l;
      }
    } catch (_) {}

    return DEFAULT_LANG;
  }

  function getSavedLang() {
    try {
      if (window.VUserData?.load) {
        const u = window.VUserData.load();
        if (u && u.lang) return normalizeLang(u.lang);
      }
    } catch (_) {}

    try {
      const ls1 = localStorage.getItem(STORAGE_KEY);
      if (ls1) return normalizeLang(ls1);
    } catch (_) {}

    try {
      const ls2 = localStorage.getItem(LEGACY_STORAGE_KEY);
      if (ls2) return normalizeLang(ls2);
    } catch (_) {}

    const detected = detectDeviceLang();
    try { localStorage.setItem(STORAGE_KEY, detected); } catch (_) {}
    try { localStorage.setItem(LEGACY_STORAGE_KEY, detected); } catch (_) {}
    return detected;
  }

  function saveLangLocal(lang) {
    const l = normalizeLang(lang);

    try { localStorage.setItem(STORAGE_KEY, l); } catch (_) {}
    try { localStorage.setItem(LEGACY_STORAGE_KEY, l); } catch (_) {}

    try {
      if (window.VUserData?.load && window.VUserData?.save) {
        const u = window.VUserData.load();
        window.VUserData.save({ ...u, lang: l });
      }
    } catch (_) {}

    return l;
  }

  async function initI18n() {
    const wanted = getSavedLang();
    const { dict, lang } = await loadUi(wanted);

    _lang = lang || wanted || DEFAULT_LANG;
    _dict = dict || {};

    applyTranslations(_dict);
    document.documentElement.lang = _lang;

    return _lang;
  }

  async function setLang(lang) {
    const l = saveLangLocal(lang);
    const { dict, lang: resolvedLang } = await loadUi(l);

    _lang = resolvedLang || l;
    _dict = dict || {};

    applyTranslations(_dict);
    document.documentElement.lang = _lang;

    // hook remote (plus tard)
    try {
      if (window.VRRemoteStore?.setLang) await window.VRRemoteStore.setLang(_lang);
    } catch (e) {
      console.warn("[VRI18n] saveLang remote failed", e);
    }

    return _lang;
  }

  window.VRI18n = {
    initI18n,
    setLang,
    getLang: () => _lang,
    t: (key) => {
      const v = resolveKey(_dict, key);
      return typeof v === "string" ? v : "";
    }
  };

  // auto init
  function boot() {
    initI18n().catch(console.warn);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();

</script>

<script>
// ===============================================
// VRealms - js/audio.js
// Version propre pour 1 seul fond par univers
// - Web Audio API
// - boucle interne avec loopStart / loopEnd
// - petit fade-in au lancement
// - duck léger pendant la mort
// ===============================================
(function () {
  "use strict";

  const AUDIO_BANK = {
    common: {
      death: "assets/audio/common/death_common.m4a",
      choice: "assets/audio/common/choice_common.m4a"
    },

    universes: {
      intro: {
        bg: "assets/audio/universes/intro/bg_loop.m4a",
        choice: "assets/audio/universes/intro/choice.m4a"
      },
      hell_king: {
        bg: "assets/audio/universes/hell_king/bg_loop.m4a",
        choice: "assets/audio/universes/hell_king/choice.m4a"
      },
      heaven_king: {
        bg: "assets/audio/universes/heaven_king/bg_loop.m4a",
        choice: "assets/audio/universes/heaven_king/choice.m4a"
      },
      mega_corp_ceo: {
        bg: "assets/audio/universes/mega_corp_ceo/bg_loop.m4a",
        choice: "assets/audio/universes/mega_corp_ceo/choice.m4a"
      },
      new_world_explorer: {
        bg: "assets/audio/universes/new_world_explorer/bg_loop.m4a",
        choice: "assets/audio/universes/new_world_explorer/choice.m4a"
      },
      vampire_lord: {
        bg: "assets/audio/universes/vampire_lord/bg_loop.m4a",
        choice: "assets/audio/universes/vampire_lord/choice.m4a"
      },
      western_president: {
        bg: "assets/audio/universes/western_president/bg_loop.m4a",
        choice: "assets/audio/universes/western_president/choice.m4a"
      }
    }
  };

  // Réglages par univers pour éviter la cassure de boucle.
  // Ajuste ces valeurs à l’oreille si besoin.
  // start = point où la boucle redémarre
  // endTrim = combien on coupe avant la fin réelle du fichier
  const BG_LOOP_POINTS = {
    intro: { start: 0.20, endTrim: 0.25 },
    hell_king: { start: 0.35, endTrim: 0.40 },
    heaven_king: { start: 0.25, endTrim: 0.30 },
    mega_corp_ceo: { start: 0.18, endTrim: 0.22 },
    new_world_explorer: { start: 0.28, endTrim: 0.35 },
    vampire_lord: { start: 0.30, endTrim: 0.38 },
    western_president: { start: 0.20, endTrim: 0.25 }
  };

  const state = {
    unlocked: false,
    currentUniverse: null,

    musicEnabled: readBool("vrealms_music_enabled", true),
    sfxEnabled: readBool("vrealms_sfx_enabled", true),

    musicVolume: readNumber("vrealms_music_volume", 0.32),
    sfxVolume: readNumber("vrealms_sfx_volume", 0.82),

    ctx: null,
    masterGain: null,
    musicGain: null,
    sfxGain: null,

    bgSource: null,
    bgBuffer: null,
    bgUniverseId: null,
    bgAbortId: 0,

    decodedCache: Object.create(null)
  };

  function clamp(v, min, max) {
    const n = Number(v);
    if (!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function readBool(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (raw === null) return !!fallback;
      return raw === "1";
    } catch (_) {
      return !!fallback;
    }
  }

  function writeBool(key, value) {
    try { localStorage.setItem(key, value ? "1" : "0"); } catch (_) {}
  }

  function readNumber(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      if (raw == null) return fallback;
      const n = Number(raw);
      return Number.isFinite(n) ? n : fallback;
    } catch (_) {
      return fallback;
    }
  }

  function resolveUniverseId(universeId) {
    const id = String(
      universeId ||
      state.currentUniverse ||
      document.body?.dataset?.universe ||
      localStorage.getItem("vrealms_universe") ||
      "hell_king"
    ).trim();

    return id || "hell_king";
  }

  function getUniverseAudio(universeId) {
    return AUDIO_BANK.universes[resolveUniverseId(universeId)] || null;
  }

  function getLoopPoints(universeId, duration) {
    const uid = resolveUniverseId(universeId);
    const cfg = BG_LOOP_POINTS[uid] || { start: 0.20, endTrim: 0.25 };

    const start = clamp(cfg.start, 0, Math.max(0, duration - 0.20));
    const end = clamp(duration - Math.max(0, cfg.endTrim), start + 0.10, duration);

    return { start, end };
  }

  function ensureAudioContext() {
    if (state.ctx) return state.ctx;

    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;

    const ctx = new Ctx();
    const masterGain = ctx.createGain();
    const musicGain = ctx.createGain();
    const sfxGain = ctx.createGain();

    masterGain.gain.value = 1;
    musicGain.gain.value = state.musicEnabled ? state.musicVolume : 0;
    sfxGain.gain.value = state.sfxEnabled ? state.sfxVolume : 0;

    musicGain.connect(masterGain);
    sfxGain.connect(masterGain);
    masterGain.connect(ctx.destination);

    state.ctx = ctx;
    state.masterGain = masterGain;
    state.musicGain = musicGain;
    state.sfxGain = sfxGain;

    return ctx;
  }

  async function unlockAudio() {
    if (state.unlocked) return;
    const ctx = ensureAudioContext();
    if (!ctx) return;

    try {
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
    } catch (_) {}

    state.unlocked = true;

    if (state.currentUniverse && state.musicEnabled) {
      startUniverseBg(state.currentUniverse);
    }
  }

  function attachUnlockListeners() {
    const handler = () => { unlockAudio(); };

    try { document.addEventListener("pointerdown", handler, { passive: true, capture: true }); } catch (_) {}
    try { document.addEventListener("touchstart", handler, { passive: true, capture: true }); } catch (_) {}
    try { document.addEventListener("keydown", handler, { passive: true, capture: true }); } catch (_) {}
  }

  async function fetchDecodedBuffer(path) {
    const ctx = ensureAudioContext();
    if (!ctx || !path) return null;

    if (state.decodedCache[path]) {
      return state.decodedCache[path];
    }

    const res = await fetch(path);
    if (!res.ok) throw new Error("Audio fetch failed: " + path);

    const arr = await res.arrayBuffer();
    const buf = await ctx.decodeAudioData(arr.slice(0));

    state.decodedCache[path] = buf;
    return buf;
  }

  function stopBackground() {
    state.bgAbortId += 1;

    if (state.bgSource) {
      try { state.bgSource.stop(); } catch (_) {}
      try { state.bgSource.disconnect(); } catch (_) {}
    }

    state.bgSource = null;
    state.bgBuffer = null;
    state.bgUniverseId = null;
  }

  async function startUniverseBg(universeId) {
    state.currentUniverse = resolveUniverseId(universeId);

    stopBackground();

    if (!state.musicEnabled) return;
    if (!state.unlocked) return;

    const ctx = ensureAudioContext();
    if (!ctx) return;

    const cfg = getUniverseAudio(state.currentUniverse);
    const path = cfg?.bg || "";
    if (!path) return;

    const myAbortId = state.bgAbortId;

    try {
      const buffer = await fetchDecodedBuffer(path);
      if (!buffer) return;
      if (myAbortId !== state.bgAbortId) return;

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;

      const pts = getLoopPoints(state.currentUniverse, buffer.duration);
      source.loopStart = pts.start;
      source.loopEnd = pts.end;

      const entryGain = ctx.createGain();
      entryGain.gain.setValueAtTime(0, ctx.currentTime);

      source.connect(entryGain);
      entryGain.connect(state.musicGain);

      // On démarre au début du fichier pour garder une vraie intro,
      // puis les répétitions repartent entre loopStart et loopEnd.
      source.start(0, 0);

      entryGain.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.65);

      state.bgSource = source;
      state.bgBuffer = buffer;
      state.bgUniverseId = state.currentUniverse;
    } catch (_) {
      stopBackground();
    }
  }

  async function playOneShot(path, volume, kind = "sfx") {
    if (!path) return;

    const ctx = ensureAudioContext();
    if (!ctx) return;

    try {
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
    } catch (_) {}

    try {
      const buffer = await fetchDecodedBuffer(path);
      if (!buffer) return;

      const src = ctx.createBufferSource();
      src.buffer = buffer;

      const gain = ctx.createGain();
      gain.gain.value = clamp(volume, 0, 1);

      src.connect(gain);
      gain.connect(kind === "music" ? state.musicGain : state.sfxGain);

      src.start(0);
    } catch (_) {}
  }

  function duckBackground(ms = 1200, factor = 0.25) {
    const ctx = ensureAudioContext();
    if (!ctx || !state.musicGain) return;

    const now = ctx.currentTime;
    const current = state.musicEnabled ? state.musicVolume : 0;
    const ducked = current * clamp(factor, 0, 1);

    try {
      state.musicGain.gain.cancelScheduledValues(now);
      state.musicGain.gain.setValueAtTime(state.musicGain.gain.value, now);
      state.musicGain.gain.linearRampToValueAtTime(ducked, now + 0.08);
      state.musicGain.gain.linearRampToValueAtTime(current, now + ms / 1000);
    } catch (_) {}
  }

  function playChoice(universeId) {
    if (!state.sfxEnabled) return;

    const cfg = getUniverseAudio(universeId);
    const path = cfg?.choice || AUDIO_BANK.common.choice || "";
    playOneShot(path, state.sfxVolume, "sfx");
  }

  function playDeath() {
    if (!state.sfxEnabled) return;

    duckBackground(1200, 0.22);
    playOneShot(AUDIO_BANK.common.death, Math.min(1, state.sfxVolume + 0.08), "sfx");
  }

  function setMusicEnabled(enabled) {
    state.musicEnabled = !!enabled;
    writeBool("vrealms_music_enabled", state.musicEnabled);

    if (state.musicGain) {
      state.musicGain.gain.value = state.musicEnabled ? state.musicVolume : 0;
    }

    if (!state.musicEnabled) {
      stopBackground();
      return;
    }

    startUniverseBg(state.currentUniverse || localStorage.getItem("vrealms_universe") || "hell_king");
  }

  function setSfxEnabled(enabled) {
    state.sfxEnabled = !!enabled;
    writeBool("vrealms_sfx_enabled", state.sfxEnabled);

    if (state.sfxGain) {
      state.sfxGain.gain.value = state.sfxEnabled ? state.sfxVolume : 0;
    }
  }

  function setMusicVolume(value) {
    state.musicVolume = clamp(value, 0, 1);
    try { localStorage.setItem("vrealms_music_volume", String(state.musicVolume)); } catch (_) {}

    if (state.musicGain && state.musicEnabled) {
      state.musicGain.gain.value = state.musicVolume;
    }
  }

  function setSfxVolume(value) {
    state.sfxVolume = clamp(value, 0, 1);
    try { localStorage.setItem("vrealms_sfx_volume", String(state.sfxVolume)); } catch (_) {}

    if (state.sfxGain && state.sfxEnabled) {
      state.sfxGain.gain.value = state.sfxVolume;
    }
  }

  function init() {
    attachUnlockListeners();

    try {
      document.addEventListener("visibilitychange", async () => {
        const ctx = ensureAudioContext();
        if (!ctx) return;

        if (document.hidden) {
          try { await ctx.suspend(); } catch (_) {}
          return;
        }

        if (state.unlocked) {
          try { await ctx.resume(); } catch (_) {}
        }
      });
    } catch (_) {}
  }

  init();

  window.VRAudio = {
    onUniverseSelected(universeId) {
      state.currentUniverse = resolveUniverseId(universeId);
      startUniverseBg(state.currentUniverse);
    },

    playChoice(universeId) {
      playChoice(universeId);
    },

    playDeath() {
      playDeath();
    },

    stopBackground,
    startUniverseBg,
    setMusicEnabled,
    setSfxEnabled,
    setMusicVolume,
    setSfxVolume,

    isMusicEnabled() {
      return !!state.musicEnabled;
    },

    isSfxEnabled() {
      return !!state.sfxEnabled;
    }
  };
})();
</script>
<script>
// ===============================================
// VRealms - js/game.js (bundle complet) — VERSION RÉPARÉE + I18N CLEAN
// - Loader univers/decks/i18n
// - UI binding + swipe animé sur les choix (A/B/C)
// - State / Endings / Engine core
// - Popups Jeton & VCoins
// - Popup Personnalisation
// - VRGame + anti-retour navigateur (best-effort)
// - ✅ SAVE LOCAL PAR UNIVERS (reprise session)
// - ✅ EVENTS: toutes les 3 cartes -> 1/10, pool 30, anti-répétition 25/30
// - ✅ Fix: events anti-répétition = 25 DISTINCTS (pas “25 tirages”)
// - ✅ Fix: undo/save restore aussi les jetons UI
// - ✅ FIX(1): swipe = PointerEvents only (+ fallback touch si pas PointerEvent)
// - ✅ FIX(2): _handleDeath() n’empile plus de listeners (bind once + delegation)
// - ✅ FIX(3): events jetons: UI ne bouge que si DB ok + refresh soft après event
// - ✅ FIX(5): i18n overlay event (Continuer / Événement)
// - ✅ COSMETICS: fallback gris + popup perso + application live
// - ✅ FIX POPUP COSMETICS: une seule ligne rerender au scroll, plus de flash global
// - ✅ JETON PEEK: blink/zoom seulement hors-peek + delta +/−% affiché en peek + % jauges mis à jour
// - ✅ FIX CRITIQUE: ne restaure plus une save morte/corrompue
// - ✅ FIX UI: popups jetons/vcoins en cartouches basiques, sans images du jeu
// - ✅ FIX I18N: plus aucun texte visible en dur dans ce fichier
// ===============================================


// -------------------------------------------------------
// Helpers profil (100% Supabase authoritative)
// -------------------------------------------------------
(function () {
  "use strict";

  const _mem = { me: null, ts: 0 };

  async function getMeFresh(maxAgeMs) {
    const now = Date.now();
    const age = now - (_mem.ts || 0);
    if (_mem.me && age <= (maxAgeMs || 0)) return _mem.me;

    try {
      const me = await window.VRRemoteStore?.getMe?.();
      if (me) {
        _mem.me = me;
        _mem.ts = now;
        return me;
      }
    } catch (_) {}

    return _mem.me;
  }

  function n(x) {
    const v = Number(x);
    return Number.isFinite(v) ? v : 0;
  }

  window.VRProfile = window.VRProfile || {
    async getMe(maxAgeMs) { return await getMeFresh(maxAgeMs); },
    _n: n
  };
})();


// -------------------------------------------------------
// ✅ Save system local (par univers) — reprise session
// -------------------------------------------------------
(function () {
  "use strict";

  const SAVE_PREFIX = "vrealms_save_";
  const SAVE_VERSION = 1;

  function _key(universeId) {
    return `${SAVE_PREFIX}${String(universeId || "unknown")}`;
  }

  function _safeParse(raw) {
    try { return JSON.parse(raw); } catch (_) { return null; }
  }

  function load(universeId) {
    try {
      const raw = localStorage.getItem(_key(universeId));
      if (!raw) return null;
      const data = _safeParse(raw);
      if (!data || typeof data !== "object") return null;
      if (data.version !== SAVE_VERSION) return null;
      if (data.universeId !== universeId) return null;
      return data;
    } catch (_) {
      return null;
    }
  }

  function save(universeId, payload) {
    try {
      const data = {
        version: SAVE_VERSION,
        universeId,
        ts: Date.now(),
        ...payload
      };
      localStorage.setItem(_key(universeId), JSON.stringify(data));
      return true;
    } catch (_) {
      return false;
    }
  }

  function clear(universeId) {
    try { localStorage.removeItem(_key(universeId)); } catch (_) {}
  }

  window.VRSave = { load, save, clear, _key };
})();


// -------------------------------------------------------
// Badge thresholds (sans mort)
// -------------------------------------------------------
const VR_BADGE_BRONZE_CHOICES = 40;
const VR_BADGE_SILVER_CHOICES = 60;
const VR_BADGE_GOLD_CHOICES = 100;


// -------------------------------------------------------
// Loader univers / deck / textes / events
// -------------------------------------------------------
(function () {
  "use strict";

  const SCENARIOS_PATH = "data/scenarios";
  const LEGACY_CONFIG_PATH = "data/universes";
  const LEGACY_DECKS_PATH = "data/decks";
  const LEGACY_I18N_PATH = "data/i18n";
  const LEGACY_EVENTS_LOGIC_PATH = "data/events";

  function normalizeScenarioLang(raw) {
    const s = String(raw || "").trim().toLowerCase();
    if (!s) return "en";
    if (s === "pt-br" || s === "ptbr") return "ptbr";
    if (s === "jp" || s === "ja" || s === "ja-jp") return "jp";
    if (s === "in" || s === "id-id") return "id";
    return s.split(/[-_]/)[0] || "en";
  }

  const VREventsLoader = {
    async loadUniverseData(universeId, lang) {
      const configPromise = this._loadConfig(universeId);
      const deckPromise = this._loadDeck(universeId);
      const textsPromise = this._loadCardTexts(universeId, lang);

      const [config, deck, cardTexts] = await Promise.all([
        configPromise,
        deckPromise,
        textsPromise
      ]);

      return { config, deck, cardTexts };
    },

    async loadUniverseEvents(universeId, lang) {
      const logicPromise = this._loadEventsLogic(universeId);
      const textsPromise = this._loadEventsTexts(universeId, lang);

      const [logic, texts] = await Promise.all([logicPromise, textsPromise]);

      return { eventsLogic: logic, eventsTexts: texts };
    },

    async _loadConfig(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/config.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_CONFIG_PATH}/${universeId}.config.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) {
        throw new Error(`[VREventsLoader] Impossible de charger la config univers ${universeId}`);
      }
      return res.json();
    },

    async _loadDeck(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/deck.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_DECKS_PATH}/${universeId}.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) {
        throw new Error(`[VREventsLoader] Impossible de charger le deck pour ${universeId}`);
      }

      const deckJson = await res.json();
      const cards = Array.isArray(deckJson) ? deckJson : (deckJson?.cards || null);

      if (!Array.isArray(cards)) {
        throw new Error(`[VREventsLoader] Deck invalide pour ${universeId} (attendu array ou {cards:[]}).`);
      }
      return cards;
    },

    async _loadCardTexts(universeId, lang) {
      const fileLang = normalizeScenarioLang(lang);
      const urlNew = `${SCENARIOS_PATH}/${universeId}/cards_${fileLang}.json`;
      const urlOld1 = `${LEGACY_I18N_PATH}/${lang}/cards_${universeId}.json`;
      const urlOld2 = `${LEGACY_I18N_PATH}/cards_${universeId}_${lang}.json`;

      let res = await fetch(urlNew, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld1, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld2, { cache: "no-cache" });

      if (!res.ok) {
        throw new Error(`[VREventsLoader] Impossible de charger les cartes de ${universeId} en ${lang}`);
      }
      return res.json();
    },

    async _loadEventsLogic(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/logic_events.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_EVENTS_LOGIC_PATH}/logic_events_${universeId}.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) return { events: [] };

      const data = await res.json();
      if (Array.isArray(data)) return { events: data };
      if (data && typeof data === "object" && Array.isArray(data.events)) return data;
      return { events: [] };
    },

    async _loadEventsTexts(universeId, lang) {
      const fileLang = normalizeScenarioLang(lang);
      const urlNew = `${SCENARIOS_PATH}/${universeId}/events_${fileLang}.json`;
      const urlOld1 = `${LEGACY_I18N_PATH}/${lang}/events_${universeId}.json`;
      const urlOld2 = `${LEGACY_I18N_PATH}/events_${universeId}_${lang}.json`;

      let res = await fetch(urlNew, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld1, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld2, { cache: "no-cache" });

      if (!res.ok) return {};
      const data = await res.json();
      return (data && typeof data === "object") ? data : {};
    }
  };

  window.VREventsLoader = VREventsLoader;
})();


(function () {
