<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vuniverse - Partie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
/* ==========================================================
   VARIABLES GLOBALES
   ========================================================== */
:root{
  --vr-bg: radial-gradient(circle at top, #f6e7cf 0, #141b2f 72%);
  --vr-overlay: none;

  --vr-card-bg: rgba(15, 23, 42, 0.92);
  --vr-card-border: rgba(209, 213, 219, 0.55);
  --vr-text-main: #f9fafb;
  --vr-text-muted: #d1d5db;

  --vr-radius-xl: 22px;
  --vr-shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.45);

  /* Defaults (si jamais une classe univers manque) */
  --vr-universe-bg: none;
  --vr-universe-card: none;
  --vr-universe-choice: none;

  /* Top icons */
  --vr-top-btn:  clamp(36px, 6.8vmin, 66px);
  --vr-top-icon: clamp(26px, 5.2vmin, 52px);

  /* Typo GAME */
  --vr-font-scn-title: clamp(15px, 2.4vmin, 28px);
  --vr-font-scn-text:  clamp(13px, 2.1vmin, 24px);
  --vr-font-choice:    clamp(13px, 2.2vmin, 24px);
}

/* sécurité : si un vieux overlay traîne */
.vr-overlay{ display:none !important; }

/* ==========================================================
   RESET / BASE
   ========================================================== */
*,
*::before,
*::after{ box-sizing: border-box; }

html{
  margin:0;
  padding:0;
  height:100%;
  background: var(--vr-bg);
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-size: cover;
}

body{
  margin:0;
  padding:0;
  min-height:100vh;
  width:100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--vr-text-main);
  background: transparent;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

/* ==========================================================
   LAYOUT PRINCIPAL
   ========================================================== */
.vr-main{
  position: relative;
  z-index: 1;
  max-width: none;
  width: 100%;
  margin: 0;
  padding: 12px 16px 24px;
}

/* ==========================================================
   HEADER HOME
   ========================================================== */
.vr-header{
  position: relative;
  z-index: 2;
  display:flex;
  justify-content:center;
  padding: 12px 24px 4px;
  max-width:none;
  margin:0;
  width:100%;
}

/* voile header OFF */
body:not(.vr-body-game) .vr-header::before{ content:none !important; display:none !important; }
body:not(.vr-body-game) .vr-header > *{ position: relative; z-index:1; }
body.vr-body-game .vr-header::before{ content:none; }

.vr-logo,
.vr-side-nav{ display:none !important; }

.vr-top-actions{
  display:flex;
  gap: 16px;
  align-items:center;
  justify-content:center;
  flex-wrap: nowrap;
}

.vr-icon-button{
  border:none;
  background: transparent;
  padding:0;
  margin:0;
  cursor:pointer;
  text-decoration:none;

  width: var(--vr-top-btn);
  height: var(--vr-top-btn);

  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.vr-top-icon{
  width: var(--vr-top-icon) !important;
  height: var(--vr-top-icon) !important;
  max-width: var(--vr-top-icon) !important;
  max-height: var(--vr-top-icon) !important;
  object-fit: contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
}

/* ==========================================================
   HUD GAME BASE
   ========================================================== */
body.vr-body-game .vr-hud{
  width:100%;
  max-width: 980px;
  margin: 0 auto 2px;

  display:grid !important;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) !important;
  align-items:center;
  gap: clamp(6px, 1.6vw, 14px);
  padding: 0 clamp(6px, 2.6vw, 14px);

  white-space: nowrap;
}

body.vr-body-game .vr-hud-left{
  justify-self:start;
  display:inline-flex;
  align-items:center;
  gap: clamp(6px, 1.6vw, 12px);
  min-width:0;
}
body.vr-body-game .vr-hud-center{
  justify-self:center;
  min-width:0;
  transform: translateX(clamp(6px, 1.2vw, 14px));
}
body.vr-body-game .vr-hud-right{
  justify-self:end;
  display:inline-flex;
  align-items:center;
  gap: clamp(6px, 1.6vw, 12px);
  min-width:0;
}

/* centre : pas de wrap, ellipsis si trop long */
body.vr-body-game .vr-hud-identity{
  justify-self:center;
  display:inline-flex;
  gap: var(--vr-hud-name-years-gap, clamp(10px, 1.8vw, 18px));
  align-items: baseline;
  justify-content:center;
  font-weight: 900;
  text-shadow: 0 2px 10px rgba(0,0,0,0.55);
  white-space: nowrap;
  max-width: min(58vw, 520px);
  overflow: hidden;
}
body.vr-body-game .vr-hud-name,
body.vr-body-game .vr-hud-years{
  overflow:hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

body.vr-body-game .vr-hud-item{
  display:inline-flex;
  align-items:center;
  gap: 8px;
  padding: clamp(4px, 1.1vh, 8px) clamp(8px, 2.2vw, 14px);
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.30);
  border: 1px solid rgba(255,255,255,0.10);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  min-height: clamp(34px, 4.8vh, 44px);
}

body.vr-body-game .vr-hud-icon{
  width:  clamp(18px, 4.2vw, 30px);
  height: clamp(18px, 4.2vw, 30px);
  object-fit: contain;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  flex:0 0 auto;
}

/* VCoins + Jeton = même bouton */
body.vr-body-game .vr-hud-icon-btn{
  -webkit-appearance: none !important;
  appearance: none !important;
  border: 0 !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;

  cursor:pointer;

  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;

  width:  clamp(18px, 4.2vw, 30px);
  height: clamp(18px, 4.2vw, 30px);

  line-height: 0 !important;
  font-size: 0 !important;
  vertical-align: middle !important;
  flex:0 0 auto;
}
body.vr-body-game .vr-hud-icon-btn .vr-hud-icon{
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}
body.vr-body-game .vr-hud-icon-btn:focus-visible{
  outline: 2px solid rgba(255,255,255,0.65);
  outline-offset: 3px;
  border-radius: 8px;
}

body.vr-body-game .vr-hud-value{
  font-weight: 900;
  font-size: clamp(12px, 2.2vmin, 16px);
  letter-spacing: 0.2px;
  white-space: nowrap;
}

body.vr-body-game .vr-hud-name,
body.vr-body-game .vr-hud-years{
  font-size: clamp(13px, 2.2vmin, 18px);
  line-height: 1.1;
  white-space: nowrap;
}

/* ==========================================================
   SELECTEUR LANGUE
   ========================================================== */
.vr-lang-selector{ display:flex; align-items:center; gap:8px; }
.vr-label{ font-size:13px; color: var(--vr-text-muted); }
.vr-select{
  background: rgba(15, 23, 42, 0.95);
  border-radius: 999px;
  border: 1px solid rgba(148,163,184,0.6);
  color: var(--vr-text-main);
  padding: 6px 10px;
  font-size: 13px;
  outline:none;
}

/* ==========================================================
   VUES
   ========================================================== */
.vr-view{ display:none; }
.vr-view-active{ display:block; }

/* ==========================================================
   HOME
   ========================================================== */
.vr-intro{ margin-top:8px; margin-bottom:16px; display:flex; justify-content:center; }

.vr-main-logo{
  height: clamp(120px, 18vmin, 190px) !important;
  width: min(90vw, 560px) !important;
  max-width: none !important;
  object-fit: contain !important;
}

.vr-section-title{ font-size:18px; margin:12px 0 10px; }
.vr-universe-grid{ display:flex; flex-direction:column; gap:10px; }

.vr-card{
  position:relative;
  border-radius: var(--vr-radius-xl);
  overflow:hidden;
  background: rgba(15, 23, 42, 0.9);
  border: 1px solid var(--vr-card-border);
  padding: 10px 14px;
  text-align:left;
  display:block;
  width:100%;
  cursor:pointer;
  box-shadow: var(--vr-shadow-soft);
}
.vr-card-disabled{ opacity:0.4; cursor:not-allowed; }
.vr-card-bg{
  position:absolute;
  inset:0;
  opacity:0.42;
  background-size:cover;
  background-position:center;
  pointer-events:none;
}
.vr-card-content{ position:relative; z-index:1; }
.vr-card-header-line{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.vr-card-title{ margin:0 0 3px; font-size:16px; }
.vr-card-text{ margin:0; font-size:13px; color: var(--vr-text-muted); }

button.vr-card{
  appearance:none;
  -webkit-appearance:none;
  border: 1px solid var(--vr-card-border);
  background: rgba(15, 23, 42, 0.9);
  color: inherit;
  font: inherit;
  text-align:left;
}
button.vr-card:focus-visible{
  outline: 2px solid rgba(255,255,255,0.65);
  outline-offset: 3px;
}

/* Tooltip */
.vr-tooltip{
  position: fixed;
  transform: translateX(-50%);
  width: min(360px, 88vw);
  max-width: 420px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.98);
  color: #e5e7eb;
  font-size: 12px;
  line-height: 1.35;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display:none;
  z-index:50;
  word-break: normal;
  overflow-wrap: break-word;
}

/* ==========================================================
   VUE JEU BASE
   ========================================================== */
#view-game{
  position: relative;
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 12px 12px 16px 12px;
  border-radius: 0;
  border: none;
  box-shadow: none;

  background-size: 100% 100%;
  background-position: center center;
  background-repeat: no-repeat;
  background-image: var(--vr-universe-bg);

  overflow: hidden;
}

#view-game::before{
  content:"";
  position:absolute;
  inset:0;
  background: transparent;
  pointer-events:none;
  z-index:0;
}

#view-game > *:not(.vr-ending-overlay):not(.vr-popup):not(.vr-token-gauge-overlay){
  position: relative;
  z-index:1;
}

/* ==========================================================
   JAUGES
   ========================================================== */
.vr-gauges-row{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:10px;
}
.vr-gauge{ display:flex; align-items:center; gap:8px; }
.vr-gauge-label{ font-size:12px; min-width:72px; }

/* % actuel + delta */
.vr-gauge-value{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-width:64px;
  font-size:12px;
  line-height:1.1;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}
.vr-gauge-val{ font-weight:900; letter-spacing:0.2px; }
.vr-gauge-delta{ font-weight:900; opacity:.95; }
body:not(.vr-peek-mode) .vr-gauge-delta{ display:none; }

.vr-gauge-frame{
  position:relative;
  width: var(--vr-gauge-size, 84px);
  height: var(--vr-gauge-size, 84px);
  flex:0 0 auto;
  background-size: contain;
  background-position:center;
  background-repeat:no-repeat;
  transform: translateZ(0);
}

.vr-gauge-fill,
.vr-gauge-preview{
  position:absolute;
  inset:0;
  background-size: contain;
  background-position:center;
  background-repeat:no-repeat;
  pointer-events:none;
  clip-path: inset(calc(100% - var(--vr-pct, 50%)) 0 0 0);
}
.vr-gauge-preview{
  opacity:0.35;
  filter: saturate(1.05) brightness(1.05);
}
.vr-gauge-fill{ opacity:1; }

/* ==========================================================
   CARTE + CHOIX
   ========================================================== */
.vr-card-container{ display:flex; justify-content:center; margin-top:8px; width:100%; }
body.vr-body-game .vr-card-container{ justify-content:center !important; }

.vr-card-stack{
  width:100%;
  max-width: min(640px, 96vw);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.vr-card-main{
  position:relative;
  width:100%;
  max-width: min(640px, 96vw);
  margin:0 auto;
  background-size: 100% 100%;
  background-position:center;
  background-repeat:no-repeat;
  background-image: var(--vr-universe-card);
  padding: 26px 30px;
  border:none;
  box-shadow:none;
}
.vr-card-main.vr-card-dragging{ transition:none; }

body.vr-body-game .vr-card-main{
  padding:
    var(--vr-scn-inset-top, 14%)
    var(--vr-scn-inset-right, 10%)
    var(--vr-scn-inset-bottom, 14%)
    var(--vr-scn-inset-left, 10%) !important;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

body.vr-body-game .vr-card-main .vr-card-title,
body.vr-body-game .vr-card-main .vr-card-text{
  width:100%;
  max-width: 100%;
  margin-left:0;
  margin-right:0;
  text-align:center;
}

body.vr-body-game .vr-card-main .vr-card-title{
  margin: 0 0 10px;
  line-height: 1.15;
  font-size: var(--vr-font-scn-title);
}
body.vr-body-game .vr-card-main .vr-card-text{
  margin:0;
  line-height:1.35;
  font-size: var(--vr-font-scn-text);
  color: var(--vr-text-muted);
}

.vr-card-choices{ display:flex; flex-direction:column; gap:14px; width:100%; }

.vr-choice-button{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;

  width:100%;
  max-width: min(640px, 96vw);
  margin:0 auto;

  min-height: 78px;
  padding: 12px 30px;

  background-color: transparent;
  background-size: 100% 100%;
  background-position:center;
  background-repeat:no-repeat;
  background-image: var(--vr-universe-choice);

  border:none;
  cursor:pointer;
}

.vr-choice-label{
  position:relative;
  z-index:1;
  color:#fff;
  font-size: var(--vr-font-choice);
  line-height:1.35;
  text-align:center;
  width:100%;
  max-width: var(--vr-choice-safe, 88%);
  margin:0 auto;
  padding: 8px 0;
  display:block;
  word-break: break-word;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}

body.vr-body-game .vr-choice-button{
  padding: 0 !important;
  overflow: hidden;
}

body.vr-body-game .vr-choice-label{
  position:absolute !important;
  inset:
    var(--vr-choice-inset-top, 18%)
    var(--vr-choice-inset-right, 10%)
    var(--vr-choice-inset-bottom, 18%)
    var(--vr-choice-inset-left, 10%) !important;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;

  width:auto !important;
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
}

/* ==========================================================
   FIN
   ========================================================== */
.vr-ending-overlay{
  position: fixed !important;
  inset: 0 !important;
  background: rgba(15, 23, 42, 0.85) !important;
  display: none !important;
  align-items: center !important;
  justify-content: center !important;
  z-index: 250000 !important;
  padding:
    max(12px, env(safe-area-inset-top))
    12px
    max(12px, env(safe-area-inset-bottom))
    12px !important;
  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch !important;
}

.vr-ending-overlay.vr-ending-visible{
  display: flex !important;
}

.vr-ending-card{
  width: min(420px, calc(100vw - 24px)) !important;
  max-width: 100% !important;
  max-height: calc(100svh - 24px) !important;
  overflow-y: auto !important;
  box-sizing: border-box !important;

  padding: clamp(14px, 3.6vw, 20px) !important;
  border-radius: clamp(16px, 4vw, 22px) !important;
  background: rgba(15, 23, 42, 0.98) !important;
  border: 1px solid rgba(209,213,219,0.5) !important;
  box-shadow: var(--vr-shadow-soft) !important;
  text-align: center !important;
}

.vr-ending-title{
  margin: 0 0 8px !important;
  font-size: clamp(18px, 4.8vw, 24px) !important;
  text-align: center !important;
}

.vr-ending-text{
  margin: 0 0 10px !important;
  font-size: clamp(12px, 3.4vw, 14px) !important;
  line-height: 1.35 !important;
  text-align: center !important;
  color: var(--vr-text-muted) !important;
}

/* ==========================================================
   FIN DE REGNE — boutons
   ========================================================== */
#vr-ending-overlay .vr-choice-button{
  background-image: none !important;
  background: rgba(255,255,255,0.08) !important;
  border: 1px solid rgba(255,255,255,0.14) !important;
  border-radius: 16px !important;
  box-shadow: 0 14px 26px rgba(0,0,0,0.24) !important;

  min-height: clamp(48px, 12vw, 56px) !important;
  padding: 10px 12px !important;

  width: 100% !important;
  max-width: none !important;

  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  overflow: hidden !important;

  color: #ffffff !important;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
  font-size: clamp(13px, 3.8vw, 16px) !important;
  font-weight: 800 !important;
  line-height: 1.2 !important;
  text-align: center !important;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35) !important;
}

#vr-ending-overlay .vr-choice-button span{
  position: static !important;
  inset: auto !important;
  width: auto !important;
  max-width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;

  display: block !important;
  text-align: inherit !important;
  color: inherit !important;
  font-family: inherit !important;
  font-size: inherit !important;
  font-weight: inherit !important;
  line-height: inherit !important;
  text-shadow: inherit !important;

  white-space: normal !important;
  overflow-wrap: anywhere !important;
}

/* ligne gain : sans cartouche */
#vr-ending-overlay .vr-ending-reward{
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;

  padding: 0 !important;
  margin: 2px 0 6px !important;

  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}

#vr-ending-overlay .vr-ending-reward img{
  width: clamp(24px, 7vw, 30px) !important;
  height: clamp(24px, 7vw, 30px) !important;
  object-fit: contain !important;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.28)) !important;
  transform: translateY(2px) !important;
}

#vr-ending-overlay .vr-ending-reward strong{
  font-size: clamp(18px, 4.8vw, 22px) !important;
  font-weight: 950 !important;
  letter-spacing: .2px !important;
  line-height: 1 !important;
}

#vr-ending-overlay .vr-ending-double{
  position: relative !important;
  overflow: hidden !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 4px !important;
  width: 100% !important;
  min-height: clamp(72px, 14vw, 92px) !important;
  padding: 12px 14px !important;
  margin-top: 4px !important;
  border: 1px solid rgba(255,255,255,.14) !important;
  border-radius: 18px !important;
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05)) !important;
  box-shadow: 0 18px 34px rgba(0,0,0,.28) !important;
  color: #fff !important;
  font: inherit !important;
  cursor: pointer !important;
}

#vr-ending-overlay .vr-ending-double-title{
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 8px !important;
  font-size: clamp(16px, 4.5vw, 20px) !important;
  font-weight: 950 !important;
  line-height: 1.05 !important;
}

#vr-ending-overlay .vr-ending-double-title img{
  width: clamp(24px, 6.5vw, 32px) !important;
  height: clamp(24px, 6.5vw, 32px) !important;
  object-fit: contain !important;
}

#vr-ending-overlay .vr-ending-double-sub{
  font-size: clamp(11px, 3vw, 13px) !important;
  font-weight: 800 !important;
  line-height: 1.25 !important;
  opacity: .92 !important;
}

#vr-ending-overlay .vr-ending-actions{
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
  margin-top: 10px !important;
}

#vr-ending-overlay .vr-ending-actions-bottom{
  display: grid !important;
  grid-template-columns: 1fr 1fr !important;
  gap: 10px !important;
  margin-top: 0 !important;
}

#vr-ending-overlay #ending-revive-btn{
  margin-bottom: 0 !important;
}

@media (max-width: 480px){
  #vr-ending-overlay .vr-ending-actions-bottom{
    grid-template-columns: 1fr !important;
  }
}

/* ==========================================================
   POPUP JETON — police de base forcée
   ========================================================== */
.vr-popup,
.vr-popup *{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}
.vr-token-gauge-overlay,
.vr-token-gauge-overlay *{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
}

.vr-popup{
  position: fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.58);
  z-index:200000;
  padding:18px;
}

.vr-popup-inner{
  width: min(560px, 94vw);

/* ==========================================================
   GAME — plein écran + pas de scroll + layout serré
   ========================================================== */
body.vr-body-game{
  overflow: hidden;

  --vr-topbar-h: calc(var(--vr-top-btn) + clamp(14px, 2.2vh, 18px) + env(safe-area-inset-top));

  --vr-gauge-size: clamp(58px, 15vw, 108px);
  --vr-card-w: clamp(360px, 96vw, 980px);

  --vr-scn-h: clamp(132px, 18svh, 280px);
  --vr-choice-h: clamp(84px, 12.8svh, 210px);

  --vr-scn-inset-top: 14%;
  --vr-scn-inset-right: 10%;
  --vr-scn-inset-bottom: 14%;
  --vr-scn-inset-left: 10%;

  --vr-choice-inset-top: 18%;
  --vr-choice-inset-right: 10%;
  --vr-choice-inset-bottom: 18%;
  --vr-choice-inset-left: 10%;

  --vr-game-gap: clamp(1px, 0.25svh, 4px);
  --vr-stack-gap: clamp(4px, 0.55svh, 8px);
  --vr-choices-gap: clamp(6px, 0.7svh, 10px);
}

body.vr-body-game .vr-game-header{ display:none !important; }

body.vr-body-game .vr-main{
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
  width:100vw !important;
  height:100vh !important;
  overflow:hidden !important;
}

body.vr-body-game #view-game{
  position: fixed;
  inset: 0;
  width:100%;
  height:100svh;
  min-height:100svh;
  margin:0;

  padding:
    var(--vr-topbar-h)
    clamp(10px, 3.4vw, 18px)
    clamp(8px, 1.2svh, 12px)
    clamp(10px, 3.4vw, 18px) !important;

  border-radius:0;
  border:none;
  box-shadow:none;
  overflow:hidden !important;

  display:grid !important;
  grid-template-rows: auto auto 1fr;
  row-gap: var(--vr-game-gap) !important;
}

body.vr-body-game #view-game .vr-hud{ grid-row: 1; }
body.vr-body-game #view-game .vr-gauges-row{ grid-row: 2; }
body.vr-body-game #view-game .vr-card-container{ grid-row: 3; }

body.vr-body-game .vr-gauges-row{
  width:100%;
  max-width: 980px;
  margin: 0 auto 0 !important;
  display:grid !important;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: clamp(8px, 2.2vw, 14px);
}

body.vr-body-game .vr-gauge{
  flex-direction:column;
  align-items:center;
  gap:6px;
}
body.vr-body-game .vr-gauge-label{
  font-size: clamp(10px, 2.0vmin, 14px);
  min-width:0;
  text-align:center;
  min-height: 2.0em;
  line-height:1.15;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 0 2px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.45);
}

body.vr-body-game .vr-card-container{
  min-height:0;
  display:flex;
  align-items:flex-start;
  justify-content:center !important;
  margin-top: 0 !important;
}

body.vr-body-game .vr-card-stack{
  width: min(100%, var(--vr-card-w)) !important;
  max-width:none !important;
  margin-inline:auto !important;
  align-self:stretch !important;
  gap: var(--vr-stack-gap) !important;
  min-height:0;
}

body.vr-body-game .vr-card-main{
  width:100% !important;
  max-width:none !important;
  margin-inline:auto !important;
  min-height: var(--vr-scn-h) !important;
  background-size: 100% 100% !important;
  padding:
    var(--vr-scn-inset-top)
    var(--vr-scn-inset-right)
    var(--vr-scn-inset-bottom)
    var(--vr-scn-inset-left) !important;
}

body.vr-body-game .vr-card-choices{ gap: var(--vr-choices-gap) !important; }
body.vr-body-game .vr-choice-button{
  width:100% !important;
  max-width:none !important;
  margin-inline:auto !important;
  min-height: var(--vr-choice-h) !important;
  background-size: 100% 100% !important;
}

/* ==========================================================
   TOP ICONS (GAME) — fixed
   ========================================================== */
body.vr-body-game .vr-top-actions-game{
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  z-index: 100000 !important;

  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  flex-wrap:nowrap !important;

  gap: clamp(8px, 2.2vw, 16px) !important;
  padding: calc(clamp(8px, 1.1vh, 12px) + env(safe-area-inset-top)) 16px 6px !important;

  pointer-events:none !important;
}
body.vr-body-game .vr-top-actions-game .vr-icon-button{
  pointer-events:auto !important;
  width: var(--vr-top-btn) !important;
  height: var(--vr-top-btn) !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
}
body.vr-body-game .vr-top-actions-game .vr-top-icon{
  width: var(--vr-top-icon) !important;
  height: var(--vr-top-icon) !important;
  max-width: var(--vr-top-icon) !important;
  max-height: var(--vr-top-icon) !important;
  object-fit: contain !important;
  display:block !important;
}

/* =========================
   0) DEFAULTS UI CHROME (fallback)
   ========================= */
body.vr-body-game{
  --vr-ui-topbar-img: none;
  --vr-ui-hud-img: none;
  --vr-ui-back-img: none;
  --vr-ui-customize-img: none;

  --vr-ui-topbar-w: clamp(220px, 54vw, 420px);
  --vr-ui-topbar-r: 0.275;
  --vr-ui-back-size: clamp(46px, 11vw, 76px);
  --vr-ui-customize-size: clamp(46px, 11vw, 76px);
  --vr-ui-hud-w: min(94vw, 980px);

  --vr-ui-topbar-top: 14px;
  --vr-ui-back-top: 18px;
  --vr-ui-back-left: 20px;
  --vr-ui-customize-top: 18px;
  --vr-ui-customize-right: 20px;

  --vr-ui-topbtn-top: 16%;
  --vr-ui-topbtn-w: 17%;
  --vr-ui-topbtn-h: 72%;
  --vr-ui-topbtn-1-left: 16%;
  --vr-ui-topbtn-2-left: 41%;
  --vr-ui-topbtn-3-left: 66%;

  --vr-hud-left-x: 3.3%;
  --vr-hud-left-w: 17.8%;
  --vr-hud-center-l: 20.2%;
  --vr-hud-center-r: 20.2%;
  --vr-hud-right-r: 5.3%;
  --vr-hud-right-w: 17.8%;
  --vr-hud-item-ty: -11px;

  --vr-identity-tx: 0px;
  --vr-identity-ty: 0px;
  --vr-hud-name-years-gap: clamp(14px, 2.4vw, 24px);

  --vr-vcoins-tx: 0px;
  --vr-vcoins-ty: -2px;
  --vr-jetons-tx: 0px;
  --vr-jetons-ty: -2px;

  --vr-vcoins-color: #FFD166;
  --vr-vcoins-glow:  rgba(255, 209, 102, .62);
  --vr-vcoins-bg:    transparent;

  --vr-jetons-color: #F3F4F6;
  --vr-jetons-glow:  rgba(243, 244, 246, .18);
  --vr-jetons-bg:    transparent;

  --vr-scn-inset-top: 14%;
  --vr-scn-inset-right: 10%;
  --vr-scn-inset-bottom: 14%;
  --vr-scn-inset-left: 10%;

  --vr-choice-inset-top: 18%;
  --vr-choice-inset-right: 10%;
  --vr-choice-inset-bottom: 18%;
  --vr-choice-inset-left: 10%;
}

/* =========================
   1) APPLY UI CHROME
   ========================= */
body.vr-body-game{
  --vr-topbar-h: calc((var(--vr-ui-topbar-w) * var(--vr-ui-topbar-r)) + env(safe-area-inset-top) + 8px);
}

body.vr-body-game .vr-top-actions-game{
  position: fixed !important;
  top: calc(var(--vr-ui-topbar-top) + env(safe-area-inset-top)) !important;
  left: 50% !important;
  right: auto !important;
  transform: translateX(-50%) !important;

  width: var(--vr-ui-topbar-w) !important;
  height: calc(var(--vr-ui-topbar-w) * var(--vr-ui-topbar-r)) !important;

  padding: 0 !important;
  margin: 0 !important;
  gap: 0 !important;

  display: block !important;
  pointer-events: none !important;
  z-index: 100000 !important;
}

body.vr-body-game .vr-top-actions-game::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-topbar-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game .vr-top-actions-game .vr-top-icon{ display:none !important; }

body.vr-body-game .vr-top-actions-game .vr-icon-button{
  position:absolute !important;
  top: var(--vr-ui-topbtn-top) !important;
  width: var(--vr-ui-topbtn-w) !important;
  height: var(--vr-ui-topbtn-h) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  pointer-events:auto !important;
  z-index:1 !important;
}
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(1){ left: var(--vr-ui-topbtn-1-left) !important; }
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(2){ left: var(--vr-ui-topbtn-2-left) !important; }
body.vr-body-game .vr-top-actions-game .vr-icon-button:nth-child(3){ left: var(--vr-ui-topbtn-3-left) !important; }

body.vr-body-game > a.vr-icon-button[aria-label="Accueil"]{
  position: fixed !important;
  top: calc(var(--vr-ui-back-top) + env(safe-area-inset-top)) !important;
  left: var(--vr-ui-back-left) !important;
  width: var(--vr-ui-back-size) !important;
  height: var(--vr-ui-back-size) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  z-index:100002 !important;
  pointer-events:auto !important;
}
body.vr-body-game > a.vr-icon-button[aria-label="Accueil"] .vr-top-icon{ display:none !important; }
body.vr-body-game > a.vr-icon-button[aria-label="Accueil"]::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-back-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game #btn-customize{
  position: fixed !important;
  top: calc(var(--vr-ui-customize-top) + env(safe-area-inset-top)) !important;
  right: var(--vr-ui-customize-right) !important;
  width: var(--vr-ui-customize-size) !important;
  height: var(--vr-ui-customize-size) !important;
  padding:0 !important;
  margin:0 !important;
  border:none !important;
  background:transparent !important;
  z-index:100002 !important;
  pointer-events:auto !important;
}
body.vr-body-game #btn-customize .vr-top-icon{ display:none !important; }
body.vr-body-game #btn-customize::before{
  content:"";
  position:absolute;
  inset:0;
  background: var(--vr-ui-customize-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.22));
  pointer-events:none;
}

body.vr-body-game .vr-hud{
  position: relative !important;
  width: var(--vr-ui-hud-w) !important;
  max-width:none !important;
  margin:0 auto !important;
  padding:0 !important;
  display:block !important;
  white-space: normal !important;

  aspect-ratio: 1024 / 269;
  background: var(--vr-ui-hud-img) center / 100% 100% no-repeat;
  filter: drop-shadow(0 10px 18px rgba(0,0,0,0.20));
}

body.vr-body-game .vr-hud-left,
body.vr-body-game .vr-hud-center,
body.vr-body-game .vr-hud-right{
  position:absolute !important;
  top:0 !important;
  bottom:0 !important;
  min-width:0 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  transform:none !important;
  justify-self:auto !important;
}
body.vr-body-game .vr-hud-left{
  left: var(--vr-hud-left-x) !important;
  width: var(--vr-hud-left-w) !important;
}
body.vr-body-game .vr-hud-center{
  left: var(--vr-hud-center-l) !important;
  right: var(--vr-hud-center-r) !important;
}
body.vr-body-game .vr-hud-right{
  right: var(--vr-hud-right-r) !important;
  width: var(--vr-hud-right-w) !important;
}

body.vr-body-game .vr-hud-item{
  width:100% !important;
  height:100% !important;
  min-height:0 !important;
  padding:0 !important;
  gap:0 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  background: transparent !important;
  border: none !important;
  box-shadow:none !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
  transform: translateY(var(--vr-hud-item-ty)) !important;
  position: relative !important;
}

body.vr-body-game .vr-hud-item .vr-hud-icon-btn{
  position:absolute !important;
  inset:0 !important;
  width:auto !important;
  height:auto !important;
  min-width:0 !important;
  min-height:0 !important;
  padding:0 !important;
  margin:0 !important;
  background:transparent !important;
  border-radius:999px !important;
  z-index:50 !important;
  cursor:pointer !important;
  pointer-events:auto !important;
  font-size:0 !important;
  line-height:0 !important;
}

body.vr-body-game .vr-hud-item .vr-hud-icon{ display:none !important; }

body.vr-body-game .vr-hud-item .vr-hud-value{
  position: relative !important;
  z-index: 3 !important;
  pointer-events:none !important;
  text-align:center !important;
}

body.vr-body-game .vr-hud-identity{
  gap: var(--vr-hud-name-years-gap) !important;
  transform: translate(var(--vr-identity-tx), var(--vr-identity-ty)) !important;
}

body.vr-body-game .vr-hud-left .vr-hud-value{
  transform: translate(var(--vr-vcoins-tx), var(--vr-vcoins-ty)) !important;
  color: var(--vr-vcoins-color) !important;
  text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 14px var(--vr-vcoins-glow) !important;
}
body.vr-body-game .vr-hud-right .vr-hud-value{
  transform: translate(var(--vr-jetons-tx), var(--vr-jetons-ty)) !important;
  color: var(--vr-jetons-color) !important;
  text-shadow: 0 2px 10px rgba(0,0,0,.55), 0 0 14px var(--vr-jetons-glow) !important;
}

body.vr-body-game .vr-hud-left .vr-hud-item{ background: var(--vr-vcoins-bg) !important; }
body.vr-body-game .vr-hud-right .vr-hud-item{ background: var(--vr-jetons-bg) !important; }

body.vr-body-game .vr-card-main{
  padding:
    var(--vr-scn-inset-top)
    var(--vr-scn-inset-right)
    var(--vr-scn-inset-bottom)
    var(--vr-scn-inset-left) !important;
}
body.vr-body-game .vr-choice-label{
  inset:
    var(--vr-choice-inset-top)
    var(--vr-choice-inset-right)
    var(--vr-choice-inset-bottom)
    var(--vr-choice-inset-left) !important;
}

body.vr-body-game[data-universe="new_world_explorer"]{
  --vr-card-w: clamp(390px, 98vw, 1100px);

  --vr-scn-h: clamp(136px, 18.0svh, 244px);

  --vr-game-gap: clamp(1px, 0.18svh, 4px);
  --vr-stack-gap: clamp(4px, 0.52svh, 10px);
  --vr-choices-gap: clamp(5px, 0.62svh, 11px);

  --vr-scn-inset-top: 13%;
  --vr-scn-inset-right: 16%;
  --vr-scn-inset-bottom: 15%;
  --vr-scn-inset-left: 16%;

  --vr-choice-inset-top: 16%;
  --vr-choice-inset-right: 10%;
  --vr-choice-inset-bottom: 16%;
  --vr-choice-inset-left: 10%;
  --vr-choice-safe: 84%;

  --vr-font-scn-title: clamp(15px, 2.4vmin, 27px);
  --vr-font-scn-text:  clamp(12px, 1.9vmin, 20px);
  --vr-font-choice:    clamp(12px, 1.85vmin, 18px);

  /* ===== Polices ===== */
  --vr-explorer-font-title: "AlegreyaSCExplorer", serif;
  --vr-explorer-font-ui: "MerriweatherExplorer", serif;

  /* ===== Tailles source RÉELLES des fichiers ===== */
  --vr-explorer-topbar-src-w: 1000;
  --vr-explorer-topbar-src-h: 275;
  --vr-explorer-hud-src-w: 1024;
  --vr-explorer-hud-src-h: 269;

  /* ===== Largeurs affichées ===== */
  --vr-explorer-topbar-w: clamp(235px, 53vw, 408px);
  --vr-explorer-hud-w: min(89vw, 930px);
  --vr-explorer-back-size: clamp(46px, 11vw, 76px);
  --vr-explorer-customize-size: clamp(46px, 11vw, 76px);

  /* ===== Décalage visuel HUD ===== */
  --vr-explorer-hud-shift-x: -6px;
  --vr-explorer-hud-shift-y: -6px;

  /* ===== Réserve haute calculée ===== */
  --vr-topbar-h: calc(
    (var(--vr-explorer-topbar-w) * var(--vr-explorer-topbar-src-h) / var(--vr-explorer-topbar-src-w))
    + env(safe-area-inset-top)
    + 2px
  );

  /* ===== Positions générales ===== */
  --vr-explorer-topbar-top: calc(5px + env(safe-area-inset-top));
  --vr-explorer-side-btn-top: calc(10px + env(safe-area-inset-top));
  --vr-explorer-side-btn-side: clamp(12px, 3vw, 20px);

  /* ===== Zones cliquables topbar ===== */
  --vr-explorer-topbar-btn-top: 16%;
  --vr-explorer-topbar-btn-h: 72%;
  --vr-explorer-topbar-btn-w: 17%;
  --vr-explorer-topbar-btn-1-left: 16%;
  --vr-explorer-topbar-btn-2-left: 41%;
  --vr-explorer-topbar-btn-3-left: 66%;

  /* ===== Placement HUD ===== */
  --vr-explorer-hud-left-x: 3.3%;
  --vr-explorer-hud-left-w: 17.8%;
  --vr-explorer-hud-center-left: 20.2%;
  --vr-explorer-hud-center-right: 20.2%;
  --vr-explorer-hud-right-x: 5.3%;
  --vr-explorer-hud-right-w: 17.8%;

  /* ===== Centre nom / année ===== */
  --vr-identity-tx: 0px;
  --vr-identity-ty: 8px;
  --vr-hud-name-years-gap: 18px;

  /* ===== Réglages soldes ===== */
  --vr-vcoins-tx: 4px;
  --vr-vcoins-ty: 9px;

  --vr-jetons-tx: 0px;
  --vr-jetons-ty: 9px;

  /* ===== Réglages fins verticaux ===== */
  --vr-explorer-hud-item-y: -9px;
  --vr-explorer-hud-value-y: -2px;
  --vr-explorer-hud-years-y: 0px;

  --vr-ui-topbar-img: url("../assets/img/ui/explorer_topbar.webp");
  --vr-ui-hud-img: url("../assets/img/ui/explorer_hud_bar.webp");
  --vr-ui-back-img: url("../assets/img/ui/explorer_back.webp");
  --vr-ui-customize-img: url("../assets/img/ui/explorer_customize.webp");

  /* ===== Couleurs HUD ===== */
  --vr-vcoins-color:#000000;
  --vr-vcoins-glow:rgba(255,255,255,.08);
  --vr-vcoins-bg: transparent;

  --vr-jetons-color:#000000;
  --vr-jetons-glow:rgba(255,255,255,.08);
  --vr-jetons-bg: transparent;

  font-family: var(--vr-explorer-font-ui);
}

// ===============================================
// VRealms - js/game.js (bundle complet) — VERSION RÉPARÉE + I18N CLEAN
// - Loader univers/decks/i18n
// - UI binding + swipe animé sur les choix (A/B/C)
// - State / Endings / Engine core
// - Popups Jeton & VCoins
// - Popup Personnalisation
// - VRGame + anti-retour navigateur (best-effort)
// - ✅ SAVE LOCAL PAR UNIVERS (reprise session)
// - ✅ EVENTS: toutes les 3 cartes -> 1/10, pool 30, anti-répétition 25/30
// - ✅ Fix: events anti-répétition = 25 DISTINCTS (pas “25 tirages”)
// - ✅ Fix: undo/save restore aussi les jetons UI
// - ✅ FIX(1): swipe = PointerEvents only (+ fallback touch si pas PointerEvent)
// - ✅ FIX(2): _handleDeath() n’empile plus de listeners (bind once + delegation)
// - ✅ FIX(3): events jetons: UI ne bouge que si DB ok + refresh soft après event
// - ✅ FIX(5): i18n overlay event (Continuer / Événement)
// - ✅ COSMETICS: fallback gris + popup perso + application live
// - ✅ FIX POPUP COSMETICS: une seule ligne rerender au scroll, plus de flash global
// - ✅ JETON PEEK: blink/zoom seulement hors-peek + delta +/−% affiché en peek + % jauges mis à jour
// - ✅ FIX CRITIQUE: ne restaure plus une save morte/corrompue
// - ✅ FIX UI: popups jetons/vcoins en cartouches basiques, sans images du jeu
// - ✅ FIX I18N: plus aucun texte visible en dur dans ce fichier
// ===============================================


// -------------------------------------------------------
// Helpers profil (100% Supabase authoritative)
// -------------------------------------------------------
(function () {
  "use strict";

  const _mem = { me: null, ts: 0 };

  async function getMeFresh(maxAgeMs) {
    const now = Date.now();
    const age = now - (_mem.ts || 0);
    if (_mem.me && age <= (maxAgeMs || 0)) return _mem.me;

    try {
      const me = await window.VRRemoteStore?.getMe?.();
      if (me) {
        _mem.me = me;
        _mem.ts = now;
        return me;
      }
    } catch (_) {}

    return _mem.me;
  }

  function n(x) {
    const v = Number(x);
    return Number.isFinite(v) ? v : 0;
  }

  window.VRProfile = window.VRProfile || {
    async getMe(maxAgeMs) { return await getMeFresh(maxAgeMs); },
    _n: n
  };
})();


// -------------------------------------------------------
// ✅ Save system local (par univers) — reprise session
// -------------------------------------------------------
(function () {
  "use strict";

  const SAVE_PREFIX = "vrealms_save_";
  const SAVE_VERSION = 1;

  function _key(universeId) {
    return `${SAVE_PREFIX}${String(universeId || "unknown")}`;
  }

  function _safeParse(raw) {
    try { return JSON.parse(raw); } catch (_) { return null; }
  }

  function load(universeId) {
    try {
      const raw = localStorage.getItem(_key(universeId));
      if (!raw) return null;
      const data = _safeParse(raw);
      if (!data || typeof data !== "object") return null;
      if (data.version !== SAVE_VERSION) return null;
      if (data.universeId !== universeId) return null;
      return data;
    } catch (_) {
      return null;
    }
  }

  function save(universeId, payload) {
    try {
      const data = {
        version: SAVE_VERSION,
        universeId,
        ts: Date.now(),
        ...payload
      };
      localStorage.setItem(_key(universeId), JSON.stringify(data));
      return true;
    } catch (_) {
      return false;
    }
  }

  function clear(universeId) {
    try { localStorage.removeItem(_key(universeId)); } catch (_) {}
  }

  window.VRSave = { load, save, clear, _key };
})();

const VR_BADGE_SILVER_CHOICES = 60;

(function () {
  "use strict";

  const SCENARIOS_PATH = "data/scenarios";
  const LEGACY_CONFIG_PATH = "data/universes";
  const LEGACY_DECKS_PATH = "data/decks";
  const LEGACY_I18N_PATH = "data/i18n";
  const LEGACY_EVENTS_LOGIC_PATH = "data/events";

  const HARD_CODED_SCENARIOS = {
    vampire_lord: (() => {
      const cards = [
        {
          id: "vl_inline_001",
          title: "Le bal rouge commence",
          body: "La noblesse vampire exige une ouverture spectaculaire pour impressionner les clans rivaux.",
          choices: {
            A: { label: "Offrir un festin de sang royal", gaugeDelta: { influence: 14, secrecy: -8 } },
            B: { label: "Organiser une réception raffinée", gaugeDelta: { influence: 8, loyalty: 4 } },
            C: { label: "Annuler le bal pour rester discret", gaugeDelta: { secrecy: 11, influence: -7 } }
          }
        },
        {
          id: "vl_inline_002",
          title: "Une chasse dans les ruelles",
          body: "Tes jeunes vampires ont faim et veulent chasser cette nuit au coeur de la ville humaine.",
          choices: {
            A: { label: "Lancer une traque massive", gaugeDelta: { blood: 13, secrecy: -12 } },
            B: { label: "Autoriser une chasse encadrée", gaugeDelta: { blood: 7, loyalty: 5 } },
            C: { label: "Imposer les réserves du château", gaugeDelta: { secrecy: 8, blood: -8 } }
          }
        },
        {
          id: "vl_inline_003",
          title: "Le conseil des anciens doute",
          body: "Les anciens remettent en cause ta vision moderne du royaume nocturne et réclament un signe fort.",
          choices: {
            A: { label: "Écraser l'opposition par la force", gaugeDelta: { loyalty: -10, influence: 12 } },
            B: { label: "Négocier un pacte entre clans", gaugeDelta: { loyalty: 10, influence: 6 } },
            C: { label: "Promettre plus de pouvoir aux anciens", gaugeDelta: { loyalty: 7, secrecy: -5 } }
          }
        },
        {
          id: "vl_inline_004",
          title: "L'aube menace le domaine",
          body: "Des chasseurs ont repéré le manoir. Il faut protéger la couronne avant le lever du soleil.",
          choices: {
            A: { label: "Transformer le quartier en forteresse", gaugeDelta: { secrecy: -9, influence: 13 } },
            B: { label: "Évacuer discrètement les héritiers", gaugeDelta: { secrecy: 12, loyalty: 4 } },
            C: { label: "Tendre une embuscade aux chasseurs", gaugeDelta: { blood: 8, loyalty: -6, influence: 5 } }
          }
        }
      ];

      const deck = cards.map((card) => ({
        id: card.id,
        universe: "vampire_lord",
        choices: {
          A: { gaugeDelta: card.choices.A.gaugeDelta },
          B: { gaugeDelta: card.choices.B.gaugeDelta },
          C: { gaugeDelta: card.choices.C.gaugeDelta }
        }
      }));

      const cardTexts = cards.reduce((acc, card) => {
        acc[card.id] = {
          title: card.title,
          body: card.body,
          choices: {
            A: card.choices.A.label,
            B: card.choices.B.label,
            C: card.choices.C.label
          }
        };
        return acc;
      }, {});

      return {
        config: {
          id: "vampire_lord",
          gauges: [
            { id: "blood", label_fr: "Sang" },
            { id: "influence", label_fr: "Influence" },
            { id: "loyalty", label_fr: "Loyauté" },
            { id: "secrecy", label_fr: "Secret" }
          ],
          initialGauges: {
            blood: 50,
            influence: 50,
            loyalty: 50,
            secrecy: 50
          }
        },
        deck,
        cardTexts
      };
    })()
  };

  const VREventsLoader = {
    async loadUniverseData(universeId, lang) {
      const configPromise = this._loadConfig(universeId);
      const deckPromise = this._loadDeck(universeId);
      const textsPromise = this._loadCardTexts(universeId, lang);

      const [config, deck, cardTexts] = await Promise.all([
        configPromise,
        deckPromise,
        textsPromise
      ]);

      return { config, deck, cardTexts };
    },

    async loadUniverseEvents(universeId, lang) {
      const logicPromise = this._loadEventsLogic(universeId);
      const textsPromise = this._loadEventsTexts(universeId, lang);

      const [logic, texts] = await Promise.all([logicPromise, textsPromise]);

      return { eventsLogic: logic, eventsTexts: texts };
    },

    async _loadConfig(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/config.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_CONFIG_PATH}/${universeId}.config.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) {
        const fallback = HARD_CODED_SCENARIOS[universeId]?.config;
        if (fallback) return fallback;
        throw new Error(`[VREventsLoader] Impossible de charger la config univers ${universeId}`);
      }
      return res.json();
    },

    async _loadDeck(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/deck.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_DECKS_PATH}/${universeId}.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) {
        const fallbackDeck = HARD_CODED_SCENARIOS[universeId]?.deck;
        if (Array.isArray(fallbackDeck)) return fallbackDeck;
        throw new Error(`[VREventsLoader] Impossible de charger le deck pour ${universeId}`);
      }

      const deckJson = await res.json();
      const cards = Array.isArray(deckJson) ? deckJson : (deckJson?.cards || null);

      if (!Array.isArray(cards)) {
        throw new Error(`[VREventsLoader] Deck invalide pour ${universeId} (attendu array ou {cards:[]}).`);
      }
      return cards;
    },

    async _loadCardTexts(universeId, lang) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/cards_${lang}.json`;
      const urlOld1 = `${LEGACY_I18N_PATH}/${lang}/cards_${universeId}.json`;
      const urlOld2 = `${LEGACY_I18N_PATH}/cards_${universeId}_${lang}.json`;

      let res = await fetch(urlNew, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld1, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld2, { cache: "no-cache" });

      if (!res.ok) {
        const fallbackTexts = HARD_CODED_SCENARIOS[universeId]?.cardTexts;
        if (fallbackTexts && typeof fallbackTexts === "object") return fallbackTexts;
        throw new Error(`[VREventsLoader] Impossible de charger les cartes de ${universeId} en ${lang}`);
      }
      return res.json();
    },

    async _loadEventsLogic(universeId) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/logic_events.json`;
      let res = await fetch(urlNew, { cache: "no-cache" });

      if (!res.ok) {
        const urlOld = `${LEGACY_EVENTS_LOGIC_PATH}/logic_events_${universeId}.json`;
        res = await fetch(urlOld, { cache: "no-cache" });
      }

      if (!res.ok) return { events: [] };

      const data = await res.json();
      if (Array.isArray(data)) return { events: data };
      if (data && typeof data === "object" && Array.isArray(data.events)) return data;
      return { events: [] };
    },

    async _loadEventsTexts(universeId, lang) {
      const urlNew = `${SCENARIOS_PATH}/${universeId}/events_${lang}.json`;
      const urlOld1 = `${LEGACY_I18N_PATH}/${lang}/events_${universeId}.json`;
      const urlOld2 = `${LEGACY_I18N_PATH}/events_${universeId}_${lang}.json`;

      let res = await fetch(urlNew, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld1, { cache: "no-cache" });
      if (!res.ok) res = await fetch(urlOld2, { cache: "no-cache" });

      if (!res.ok) return {};
      const data = await res.json();
      return (data && typeof data === "object") ? data : {};
    }
  };

  window.VREventsLoader = VREventsLoader;
})();


(function () {
  "use strict";

  const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
  const HAS_POINTER = ("PointerEvent" in window);

  const VRUIBinding = {
    updateMeta(kingName, years, coins, tokens) {
      const kingEl = document.getElementById("meta-king-name");
      const yearsEl = document.getElementById("meta-years");
      const coinsEl = document.getElementById("meta-coins");
      const tokensEl = document.getElementById("meta-tokens");

      if (kingEl) kingEl.textContent = kingName || "—";
      if (yearsEl) yearsEl.textContent = String(years || 0);
      if (coinsEl) coinsEl.textContent = String(coins || 0);
      if (tokensEl) tokensEl.textContent = String(tokens || 0);
    },

    universeConfig: null,
    lang: "fr",
    currentCardLogic: null,
    cardTextsDict: null,
    peekRemaining: 0,
    _peekChoiceActive: null,

    init(universeConfig, lang, cardTextsDict) {
      this.universeConfig = universeConfig;
      this.lang = lang || "fr";
      this.cardTextsDict = cardTextsDict || {};

      this.peekRemaining = 0;
      this._peekChoiceActive = null;
      try { document.body?.classList?.remove("vr-peek-mode"); } catch (_) {}

      this._ensurePeekStyles();
      this._setupGaugeLabels();
      this._ensureGaugePreviewBars();
      this.updateGauges();
      this._setupChoiceButtons();
    },

    enablePeek(steps) {
      const n = Math.max(0, Math.min(Number(steps || 0), 99));
      this.peekRemaining = n;

      this._ensurePeekStyles();

      try {
        if (n > 0) document.body.classList.add("vr-peek-mode");
        else document.body.classList.remove("vr-peek-mode");
      } catch (_) {}

      this.updateGauges();
    },

    _ensurePeekStyles() {
      try {
        const ID = "vr_peek_styles";
        if (document.getElementById(ID)) return;

        const style = document.createElement("style");
        style.id = ID;
style.textContent = `
@keyframes vrGaugeBlinkGlow {
  0% {
    filter: brightness(1) contrast(1);
    opacity: 1;
  }
  50% {
    filter: brightness(1.85) contrast(1.2);
    opacity: .82;
  }
  100% {
    filter: brightness(1) contrast(1);
    opacity: 1;
  }
}

@keyframes vrGaugeBlinkPulse {
  0% {
    transform: translateZ(0) scale(1);
  }
  50% {
    transform: translateZ(0) scale(1.08);
  }
  100% {
    transform: translateZ(0) scale(1);
  }
}

  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-width:64px;
  line-height:1.05;
  font:900 12px/1 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  letter-spacing:.2px;
  text-shadow:0 2px 10px rgba(0,0,0,.45);
}

body:not(.vr-peek-mode) .vr-gauge-value{
  opacity:0 !important;
  visibility:hidden !important;
}

body.vr-peek-mode .vr-gauge-value{
  opacity:1 !important;
  visibility:visible !important;
}

.vr-gauge-delta:empty{
  display:none !important;
}

body.vr-peek-mode .vr-gauge.vr-peek-up .vr-gauge-delta{
  color:inherit;
}
body.vr-peek-mode .vr-gauge.vr-peek-down .vr-gauge-delta{
  color:inherit;
}

body:not(.vr-peek-mode) .vr-gauge.vr-peek-up .vr-gauge-fill,
body:not(.vr-peek-mode) .vr-gauge.vr-peek-down .vr-gauge-fill{
  transform-origin:50% 50%;
  animation:
    vrGaugeBlinkGlow 620ms ease-in-out infinite,
    vrGaugeBlinkPulse 620ms ease-in-out infinite;
}

body.vr-peek-mode .vr-gauge.vr-peek-up .vr-gauge-fill,
body.vr-peek-mode .vr-gauge.vr-peek-down .vr-gauge-fill{
  animation:none !important;
  filter:brightness(1.12) saturate(1.02);
}

body:not(.vr-peek-mode) .vr-gauge-preview{
  opacity:0 !important;
}
body.vr-peek-mode .vr-gauge-preview{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:.55;
  clip-path:inset(calc(100% - var(--vr-pct, 0%)) 0 0 0);
}
`;
        (document.head || document.documentElement).appendChild(style);
      } catch (_) {}
    },

    _consumePeekDecision() {
      if (this.peekRemaining <= 0) return;

      this.peekRemaining = Math.max(0, this.peekRemaining - 1);

      if (this.peekRemaining <= 0) {
        this.peekRemaining = 0;
        this._clearPeek();
        try { document.body.classList.remove("vr-peek-mode"); } catch (_) {}
        this.updateGauges();
      }
    },

    _setupGaugeLabels() {
      const gaugesCfg = this.universeConfig?.gauges || [];
      const gaugeEls = document.querySelectorAll(".vr-gauge");
      const universeId = this.universeConfig?.id || "unknown";

      gaugeEls.forEach((el, idx) => {
        const labelEl = el.querySelector(".vr-gauge-label");
        const fillEl = el.querySelector(".vr-gauge-fill");
        const cfg = gaugesCfg[idx];
        if (!cfg) return;

        const gaugeId = cfg.id;

        const i18nKey = `gauges.${universeId}.${gaugeId}`;
        const translated =
          window.VRI18n && typeof window.VRI18n.t === "function"
            ? window.VRI18n.t(i18nKey)
            : null;

        const label =
          (translated && translated !== i18nKey ? translated : null) ||
          cfg?.[`label_${this.lang}`] ||
          cfg?.label ||
          cfg?.id;

        if (labelEl) labelEl.textContent = label || "—";

        if (fillEl) fillEl.dataset.gaugeId = gaugeId;
        el.dataset.gaugeId = gaugeId;
      });
    },

    _ensureGaugePreviewBars() {
      const gaugeEls = document.querySelectorAll(".vr-gauge");

      gaugeEls.forEach((el) => {
        try {
          el.querySelectorAll(".vr-gauge-under").forEach((n) => n.remove());
        } catch (_) {}

        let preview = el.querySelector(".vr-gauge-preview");
        if (!preview) {
          preview = document.createElement("div");
          preview.className = "vr-gauge-preview";
          preview.style.setProperty("--vr-pct", "0%");

          const frame = el.querySelector(".vr-gauge-frame");
          if (frame) {
            try {
              const pos = getComputedStyle(frame).position;
              if (pos === "static") frame.style.position = "relative";
            } catch (_) {}
            frame.appendChild(preview);
          }
        }
      });
    },

    updateGauges() {
      const gaugesCfg = this.universeConfig?.gauges || [];
      const gaugeEls = document.querySelectorAll(".vr-gauge");

      const isPeek = (() => {
        try { return document.body.classList.contains("vr-peek-mode"); }
        catch (_) { return false; }
      })();

      gaugeEls.forEach((gEl, idx) => {
        const cfg = gaugesCfg[idx];
        const gaugeId = gEl?.dataset?.gaugeId || cfg?.id || null;
        if (!gaugeId) return;

        const val =
          (window.VRState?.getGaugeValue?.(gaugeId) ??
            this.universeConfig?.initialGauges?.[gaugeId] ??
            cfg?.start ??
            50);

        const safeVal = clamp(Number(val) || 0, 0, 100);

        const fillEl = gEl.querySelector(".vr-gauge-fill");
        if (fillEl) {
          fillEl.dataset.gaugeId = gaugeId;
          fillEl.style.setProperty("--vr-pct", `${safeVal}%`);
        }

        const valEl = gEl.querySelector(".vr-gauge-val");
        if (valEl) valEl.textContent = isPeek ? `${Math.round(safeVal)}%` : "";

        const deltaEl = gEl.querySelector(".vr-gauge-delta");
        if (deltaEl) deltaEl.textContent = "";

        const previewEl = gEl.querySelector(".vr-gauge-preview");
        if (previewEl) previewEl.style.setProperty("--vr-pct", "0%");
      });

      this._clearPeekClasses();
    },

    showCard(cardLogic) {
      this.currentCardLogic = cardLogic;
      const texts = this.cardTextsDict?.[cardLogic.id];
      if (!texts) {
        console.error("[VRUIBinding] Textes introuvables pour la carte", cardLogic.id);
        return;
      }

      const titleEl = document.getElementById("card-title");
      const bodyEl = document.getElementById("card-text");
      const choiceAEl = document.getElementById("choice-A");
      const choiceBEl = document.getElementById("choice-B");
      const choiceCEl = document.getElementById("choice-C");

      if (titleEl) titleEl.textContent = texts.title || "";
      if (bodyEl) bodyEl.textContent = texts.body || "";
      if (choiceAEl) choiceAEl.textContent = texts.choices?.A || "";
      if (choiceBEl) choiceBEl.textContent = texts.choices?.B || "";
      if (choiceCEl) choiceCEl.textContent = texts.choices?.C || "";

      this._resetChoiceCards();
      this._clearPeek();
      this.updateGauges();
    },

    _resetChoiceCards() {
      const btns = document.querySelectorAll(".vr-choice-button[data-choice]");
      btns.forEach((b) => {
        b.style.transition = "";
        b.style.transform = "";
      });
    },

    _setupChoiceButtons() {
      const buttons = Array.from(document.querySelectorAll(".vr-choice-button[data-choice]"));

      buttons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
        });

        try { btn.style.touchAction = "none"; } catch (_) {}
        this._setupSwipeOnChoiceCard(btn);
      });
    },

    _setupSwipeOnChoiceCard(btn) {
      const TH = 62;
      const ROT_MAX = 12;
      const PREVIEW_TH = 12;
      let startX = 0;
      let startY = 0;
      let lastX = 0;
      let lastY = 0;
      let dragging = false;
      let pointerId = null;

      const getPoint = (e) => {
        if (e.touches && e.touches[0]) {
          return { x: e.touches[0].clientX || 0, y: e.touches[0].clientY || 0 };
        }
        return { x: e.clientX || 0, y: e.clientY || 0 };
      };

      const setTransform = (dx) => {
        const w = Math.max(1, window.innerWidth || 360);
        const p = clamp(dx / (w * 0.45), -1, 1);
        const rot = p * ROT_MAX;
        btn.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      };

      const animateBack = () => {
        btn.style.transition = "transform 180ms cubic-bezier(.2,.9,.2,1)";
        btn.style.transform = "translateX(0px) rotate(0deg)";
        window.setTimeout(() => { btn.style.transition = ""; }, 200);
      };

      const animateFlyOut = (dx, done) => {
        const dir = dx >= 0 ? 1 : -1;
        const outX = dir * (Math.max(window.innerWidth || 360, 360) * 1.2);

        btn.style.transition = "transform 220ms cubic-bezier(.2,.9,.2,1)";
        btn.style.transform = `translateX(${outX}px) rotate(${dir * ROT_MAX}deg)`;

        window.setTimeout(() => {
          btn.style.transition = "";
          btn.style.transform = "";
          done && done();
        }, 235);
      };

      const onDown = (e) => {
        if (!this.currentCardLogic) return;

        try { e.preventDefault(); } catch (_) {}
        try { e.stopPropagation(); } catch (_) {}

        dragging = true;
        const p = getPoint(e);
        startX = p.x;
        startY = p.y;
        lastX = p.x;
        lastY = p.y;

        pointerId = e.pointerId ?? null;
        try { if (pointerId != null) btn.setPointerCapture(pointerId); } catch (_) {}
      };

      const onMove = (e) => {
        if (!dragging) return;

        try { e.preventDefault(); } catch (_) {}
        try { e.stopPropagation(); } catch (_) {}

        const p = getPoint(e);
        lastX = p.x;
        lastY = p.y;

        const dx = lastX - startX;
        const dy = lastY - startY;

        if (Math.abs(dy) > Math.abs(dx) * 1.25) {
          this._clearPeek();
          setTransform(dx * 0.25);
          return;
        }

        if (Math.abs(dx) >= PREVIEW_TH) {
          const choiceId = btn.getAttribute("data-choice");
          if (choiceId) {
            if (this.peekRemaining > 0) this._showPeekForChoice(choiceId);
            else this._showBlinkOnlyForChoice(choiceId);
          }
        } else {
          this._clearPeek();
        }

        setTransform(dx);
      };

      const onUp = () => {
        if (!dragging) return;
        dragging = false;

        const dx = lastX - startX;
        this._clearPeek();

        if (Math.abs(dx) >= TH && this.currentCardLogic) {
          const choiceId = btn.getAttribute("data-choice");
          if (!choiceId) { animateBack(); return; }

          animateFlyOut(dx, () => {
            try { window.VREngine.applyChoice(this.currentCardLogic, choiceId); } catch (_) {}
          });
        } else {
          animateBack();
        }
      };

      if (HAS_POINTER) {
        btn.addEventListener("pointerdown", onDown, { passive: false });
        btn.addEventListener("pointermove", onMove, { passive: false });
        btn.addEventListener("pointerup", onUp, { passive: true });
        btn.addEventListener("pointercancel", onUp, { passive: true });
      } else {
        btn.addEventListener("touchstart", onDown, { passive: false });
        btn.addEventListener("touchmove", onMove, { passive: false });
        btn.addEventListener("touchend", onUp, { passive: true });
        btn.addEventListener("touchcancel", onUp, { passive: true });
      }
    },

    _clearPeekClasses() {
      try {
        document.querySelectorAll(".vr-gauge").forEach((g) => {
          g.classList.remove("vr-peek-up");
          g.classList.remove("vr-peek-down");
        });
      } catch (_) {}
    },

    _clearPeek() {
      this._peekChoiceActive = null;

      try {
        document.querySelectorAll(".vr-gauge-preview").forEach((previewEl) => {
          previewEl.style.setProperty("--vr-pct", "0%");
        });

        document.querySelectorAll(".vr-gauge-delta").forEach((dEl) => {
          dEl.textContent = "";
        });
      } catch (_) {}

      this._clearPeekClasses();
    },

    _showBlinkOnlyForChoice(choiceId) {
      if (!this.currentCardLogic?.choices?.[choiceId]) return;

      this._clearPeekClasses();
      try {
        document.querySelectorAll(".vr-gauge-delta").forEach((dEl) => {
          dEl.textContent = "";
        });
      } catch (_) {}

      const deltas = this.currentCardLogic.choices[choiceId]?.gaugeDelta || {};
      for (const [gaugeId, delta] of Object.entries(deltas)) {
        if (typeof delta !== "number" || delta === 0) continue;

        const el = document.querySelector(`.vr-gauge[data-gauge-id="${gaugeId}"]`);
        if (!el) continue;

        el.classList.add(delta > 0 ? "vr-peek-up" : "vr-peek-down");
      }
    },

    _showPeekForChoice(choiceId) {
      if (!this.currentCardLogic?.choices?.[choiceId]) return;

      this._peekChoiceActive = choiceId;

      const gaugesCfg = this.universeConfig?.gauges || [];
      const gaugeEls = document.querySelectorAll(".vr-gauge");
      const previewEls = document.querySelectorAll(".vr-gauge-preview");

      gaugeEls.forEach((g, idx) => {
        g.classList.remove("vr-peek-up");
        g.classList.remove("vr-peek-down");

        const cfg = gaugesCfg[idx];
        const gaugeId = g?.dataset?.gaugeId || cfg?.id || null;

        const currentVal =
          (gaugeId != null)
            ? (window.VRState?.getGaugeValue?.(gaugeId) ??
              this.universeConfig?.initialGauges?.[gaugeId] ??
              cfg?.start ??
              50)
            : 50;

        const valEl = g.querySelector(".vr-gauge-val");
        if (valEl) valEl.textContent = `${Math.round(Number(currentVal) || 0)}%`;

        const deltaEl = g.querySelector(".vr-gauge-delta");
        if (deltaEl) deltaEl.textContent = "";
      });

      previewEls.forEach((previewEl, idx) => {
        const cfg = gaugesCfg[idx];
        if (!cfg) return;

        const gaugeId = cfg.id;

        const baseVal =
          (window.VRState?.getGaugeValue?.(gaugeId) ??
            this.universeConfig?.initialGauges?.[gaugeId] ??
            cfg?.start ??
            50);

        const d = this.currentCardLogic.choices[choiceId]?.gaugeDelta?.[gaugeId];
        const delta = (typeof d === "number") ? d : 0;

        const previewVal = clamp((Number(baseVal) || 0) + delta, 0, 100);
        previewEl.style.setProperty("--vr-pct", `${previewVal}%`);

        const gaugeEl = gaugeEls[idx];
        if (!gaugeEl) return;

        if (delta > 0) gaugeEl.classList.add("vr-peek-up");
        else if (delta < 0) gaugeEl.classList.add("vr-peek-down");

        const deltaEl = gaugeEl.querySelector(".vr-gauge-delta");
        if (deltaEl) {
          if (delta > 0) deltaEl.textContent = `+${Math.round(delta)}%`;
          else if (delta < 0) deltaEl.textContent = `-${Math.round(Math.abs(delta))}%`;
          else deltaEl.textContent = "";
        }
      });
    }
  };

  window.VRUIBinding = VRUIBinding;
})();

(function () {
  "use strict";

  const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

  const VRState = {
    universeId: null,
    gauges: {},
    gaugeOrder: [],
    alive: false,
    lastDeath: null,
    reignYears: 0,
    cardsPlayed: 0,

    initUniverse(universeConfig) {
      this.universeId = universeConfig.id;
      this.gauges = {};
      this.gaugeOrder = [];
      this.alive = true;
      this.lastDeath = null;
      this.reignYears = 0;
      this.cardsPlayed = 0;

      (universeConfig.gauges || []).forEach((g) => {
        this.gauges[g.id] = universeConfig?.initialGauges?.[g.id] ?? g.start ?? 50;
        this.gaugeOrder.push(g.id);
      });
    },

    isAlive() { return this.alive; },
    getGaugeValue(id) { return this.gauges[id]; },

    setGaugeValue(id, val) {
      this.gauges[id] = clamp(Number(val ?? 50), 0, 100);
      this.lastDeath = null;
      this.alive = true;
    },

    applyDeltas(deltaMap) {
      if (!this.alive) return;

      Object.entries(deltaMap || {}).forEach(([gaugeId, delta]) => {
        const current = this.gauges[gaugeId] ?? 50;
        const next = clamp(current + delta, 0, 100);
        this.gauges[gaugeId] = next;
      });

      this.lastDeath = null;
      for (const gaugeId of Object.keys(this.gauges)) {
        const v = this.gauges[gaugeId];
        if (v <= 0) { this.alive = false; this.lastDeath = { gaugeId, direction: "down" }; break; }
        if (v >= 100) { this.alive = false; this.lastDeath = { gaugeId, direction: "up" }; break; }
      }
    },

    tickYear() { if (this.alive) this.reignYears += 1; },
    getReignYears() { return this.reignYears; },
    incrementCardsPlayed() { this.cardsPlayed += 1; },
    getLastDeath() { return this.lastDeath; }
  };

  window.VRState = VRState;
})();

(function () {
  "use strict";

  const ENDINGS_BASE_PATH = "data/scenarios";
  const cache = new Map();

  async function loadEndings(universeId, lang) {
    const key = `${universeId}__${lang}`;
    if (cache.has(key)) return cache.get(key);

    const urlNew = `${ENDINGS_BASE_PATH}/${universeId}/endings_${lang}.json`;
    const urlOld1 = `data/i18n/${lang}/endings_${universeId}.json`;
    const urlOld2 = `data/i18n/endings_${universeId}_${lang}.json`;

    let res = await fetch(urlNew, { cache: "no-cache" });
    if (!res.ok) res = await fetch(urlOld1, { cache: "no-cache" });
    if (!res.ok) res = await fetch(urlOld2, { cache: "no-cache" });

    if (!res.ok) {
      const empty = {};
      cache.set(key, empty);
      return empty;
    }

    const data = await res.json();
    const safe = data && typeof data === "object" ? data : {};
    cache.set(key, safe);
    return safe;
  }

  async function showEnding(universeConfig, lastDeath) {
    const overlay = document.getElementById("vr-ending-overlay");
    const titleEl = document.getElementById("ending-title");
    const textEl = document.getElementById("ending-text");

    if (!overlay || !titleEl || !textEl) return;

    const universeId =
      universeConfig?.id || localStorage.getItem("vrealms_universe") || "vampire_lord";

    let lang = "fr";
    try {
      const me = await window.VRProfile?.getMe?.(4000);
      lang = (me?.lang || "fr").toString();
    } catch (_) {
      lang = localStorage.getItem("vrealms_lang") || "fr";
    }

    const endings = await loadEndings(universeId, lang);

    const gaugeId = lastDeath?.gaugeId || null;
    const direction = lastDeath?.direction || null;

    const candidates = [];
    let value = null;
    if (direction === "down") value = "0";
    if (direction === "up") value = "100";

    if (gaugeId && direction) {
      candidates.push(`${gaugeId}_${direction}`);
    }
    if (gaugeId && value != null) {
      candidates.push(`${gaugeId}_${value}`);
      candidates.push(`end_${gaugeId}_${value}`);

      const esc = String(gaugeId).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const reEnd = new RegExp(`(^|_)end_${esc}_${value}$`);
      for (const k of Object.keys(endings || {})) {
        if (reEnd.test(k)) candidates.push(k);
      }
    }

    candidates.push("default");

    let ending = null;
    for (const k of candidates) {
      if (k && endings && endings[k]) { ending = endings[k]; break; }
    }

    const t = (key) => {
      try {
        const out = window.VRI18n?.t?.(key);
        if (out && out !== key) return out;
      } catch (_) {}
      return "";
    };

    titleEl.textContent = ending?.title || t("game.ending.title");
    textEl.textContent =
      ending?.text || ending?.body || t("game.ending.body");

    overlay.classList.add("vr-ending-visible");
  }

  function hideEnding() {
    const overlay = document.getElementById("vr-ending-overlay");
    if (!overlay) return;
    overlay.classList.remove("vr-ending-visible");
  }

  window.VREndings = { showEnding, hideEnding };
})();

  function toRoman(num) {
    const n = Math.max(1, Number(num || 1));
    const map = [
      [1000, "M"], [900, "CM"], [500, "D"], [400, "CD"],
      [100, "C"], [90, "XC"], [50, "L"], [40, "XL"],
      [10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]

    let rest = n;
    let out = "";

    for (const [value, symbol] of map) {

        rest -= value;
      }
    }

    return out || "I";
